  // ---- Inbox ----
  function viewInbox() {
    const items = state.predios.slice().sort((a,b) => (b.captured_at || '').localeCompare(a.captured_at || ''));
    const empty = items.length === 0;
    const firstName = (state.extensionista.nombre || '').split(' ')[0] || 'Extensionista';
    
    // Header persistente con zona descargada (siempre visible si hay zona,
    // sea modo distritos clásico o solo zonas de alta precisión)
    let zoneHeader = '';
    let contextualHint = '';
    const zone = state.cachedMapZone;
    if (zone) {
      // Descripción del mapa descargado (combina distritos y zonas de precisión)
      const nDistritos = (zone.distritos || []).length;
      const nPrecision = (zone.precisionZones || []).length;
      const descParts = [];
      if (zone.region && zone.provincia) {
        if (nDistritos > 0 && nDistritos <= 2) {
          descParts.push(`${zone.region} → ${zone.provincia}: <span style="color:var(--navy);font-weight:400">${zone.distritos.join(', ')}</span>`);
        } else if (nDistritos > 0) {
          descParts.push(`${zone.region} → ${zone.provincia} <span style="color:var(--gray);font-weight:400">· ${nDistritos} distritos</span>`);
        } else {
          descParts.push(`${zone.region} → ${zone.provincia}`);
        }
      }
      if (nPrecision > 0) {
        descParts.push(`<span style="color:var(--gray);font-weight:400">${nPrecision} ${nPrecision===1?'zona':'zonas'} de alta precisión</span>`);
      }
      const desc = descParts.length ? descParts.join(' · ') : 'Mapa descargado';
      // Tiempo transcurrido desde la última descarga
      let timeAgo = '';
      let hoursElapsed = 0;
      if (zone.downloaded_at) {
        const elapsedMs = Date.now() - new Date(zone.downloaded_at).getTime();
        hoursElapsed = elapsedMs / 3600000;
        const days = Math.floor(elapsedMs / 86400000);
        const hours = Math.floor(elapsedMs / 3600000);
        const mins = Math.floor(elapsedMs / 60000);
        if (days >= 1) timeAgo = 'hace ' + days + (days===1 ? ' día' : ' días');
        else if (hours >= 1) timeAgo = 'hace ' + hours + (hours===1 ? ' hora' : ' horas');
        else if (mins >= 1) timeAgo = 'hace ' + mins + ' min';
        else timeAgo = 'recién';
      }
      zoneHeader = `
        <div class="map-zone-header">
          <div class="map-zone-info">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--blue);flex-shrink:0"><path d="M3 7l9-4 9 4M3 7v13l9 4 9-4V7M3 7l9 4 9-4"/></svg>
            <div><strong>Mapa offline:</strong> ${desc}</div>
          </div>
          <a href="#" class="map-zone-link" id="inbox-change-zone">Descargar zonas para hoy</a>
        </div>
        <div id="gps-out-banner" class="banner banner-warn" style="display:none;margin-bottom:12px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M12 22s8-7 8-13a8 8 0 1 0-16 0c0 6 8 13 8 13z"/><circle cx="12" cy="9" r="2"/></svg>
          <div><b>Estás fuera de tu zona descargada.</b> <a href="#" id="gps-add-zone" style="color:var(--blue);text-decoration:underline">Descargar tiles de esta zona</a></div>
        </div>
        ${state.inboxBannerDismissed ? '' : `
        <div id="inbox-offline-banner" class="banner" style="background: var(--pale-green); border: 1px solid #B8DDE8; border-color: rgba(63, 152, 79, 0.3); margin-bottom: 12px; padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start; font-size: 13px;">
          <svg style="flex-shrink: 0; color: var(--green-dark); margin-top: 1px" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          <div style="flex: 1; color: var(--navy);"><b>Modo offline listo.</b> Cuando salgas a campo sin red, podrás ver el mapa y capturar predios sin problemas. Todo se sincroniza cuando vuelvas a tener conexión.</div>
          <button id="inbox-banner-close" style="background:none;border:none;color:var(--gray);cursor:pointer;padding:0;font-size:18px;line-height:1;flex-shrink:0" aria-label="Cerrar">✕</button>
        </div>
        `}
      `;
      // Texto contextual debajo del saludo (solo si pasaron 24h o más desde descarga)
      if (hoursElapsed >= 24) {
        contextualHint = `<p style="margin-top:-12px; margin-bottom:18px; color:#7C5A2E; font-size:13px;">Última descarga ${timeAgo}. ¿Vas a un sector nuevo? <a href="#" id="inbox-old-zone-link" style="color:var(--blue); text-decoration:underline">Descargar zonas para hoy</a></p>`;
      } else if (timeAgo) {
        contextualHint = `<p style="margin-top:-12px; margin-bottom:18px; color:var(--gray); font-size:12px;">Última descarga ${timeAgo}.</p>`;
      }
    }

    let html = `
      ${zoneHeader}
      <p class="h-kicker">Bandeja</p>
      <h1 class="h-title">Parcelas capturadas</h1>
      <p class="h-sub">Hola, <b>${firstName}</b>. ${empty ? 'Aún no hay parcelas. Toca «Nueva parcela» para empezar.' : `Hay <b>${items.length}</b> parcela${items.length>1?'s':''} lista${items.length>1?'s':''} para subir a la plataforma.`}</p>
    ${contextualHint}
    `;
    if (!empty) {
      html += `
        <div class="banner banner-warn" style="margin-top:-6px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M12 17V3M5 10l7 7 7-7M5 21h14"/></svg>
          <div><b>Descarga el paquete B4BLite_Offline</b> de cada predio antes de cerrar la app. El paquete (.json) contiene M0 + M1 Lite + M2 Offline y se importa en B4B web vía «Nuevo proyecto».</div>
        </div>
        
      `;
    }
    if (empty) {
      html += `
        <div class="empty">
          <div class="empty-icon">
            <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4M3 7v13l9 4 9-4V7M3 7l9 4 9-4M12 11v13"/></svg>
          </div>
          <h2 class="empty-title">Sin parcelas todavía</h2>
          <p class="empty-sub">Cada parcela capturada se guarda automáticamente aquí. Puedes exportarlas una por una cuando vuelvas a tener señal.</p>
        </div>
      `;
    } else {
      html += `<div style="margin-top:6px">`;
      for (const p of items) {
        const initial = (p.nombre_finca || p.nombre_productor || 'P')[0].toUpperCase();
        const fecha = new Date(p.captured_at);
        const fechaStr = fecha.toLocaleDateString('es-PE', { day:'2-digit', month:'short', year: 'numeric' });
        html += `
          <div class="predio-row" data-uuid="${p.predio_uuid}">
            <div class="predio-icon">${initial}</div>
            <div class="predio-info">
              <p class="predio-name">${p.nombre_finca || p.nombre_productor || 'Sin nombre'}</p>
              <p class="predio-meta">${p.predio_codigo} · ${fechaStr}${p.poligono?.length ? ' · ' : ''}${p.poligono?.length ? `<span class="chip chip-info" style="padding:2px 8px;font-size:10px">${p.poligono.length} pts</span>`:''}</p>
            </div>
            <div class="predio-actions">
              <button class="predio-action-btn" data-action="visibility" data-uuid="${p.predio_uuid}" title="Mostrar en mapa al trazar" style="color:${state.visibleParcelas[p.predio_uuid] ? 'var(--green-dark)' : 'var(--lightgray)'}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="${state.visibleParcelas[p.predio_uuid] ? 'var(--pale-green)' : 'none'}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <button class="predio-action-btn danger" data-action="delete" data-uuid="${p.predio_uuid}" title="Eliminar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
              </button>
            </div>
          </div>
          <div class="module-strip" data-strip-uuid="${p.predio_uuid}">
            <button class="module-btn m1" data-module="m1lite" data-uuid="${p.predio_uuid}">M1 Lite</button>
            <button class="module-btn m2" data-module="m2offline" data-uuid="${p.predio_uuid}">M2 Offline</button>
            <button class="module-btn export" data-module="pack" data-uuid="${p.predio_uuid}">Paquete</button>
          </div>
        `;
      }
      html += `</div>`;
    }
    $view().innerHTML = html;

    // Action bar
    let bar = `<button class="btn btn-success btn-lg" id="new-predio" style="flex:1">+ Nueva parcela</button>`;
    if (!empty) {
      bar = `<button class="btn btn-secondary flex-0" id="export-all" title="Descargar paquetes de todos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17V3M5 10l7 7 7-7M5 21h14"/></svg>
      </button>` + bar;
    }
    setActionBar(bar);

    $('#new-predio').addEventListener('click', startNewPredio);
    if ($('#export-all')) {
      $('#export-all').addEventListener('click', exportAll);
    }
    // Botones de la fila (solo delete; export individual reemplazado por module-strip)
    $view().querySelectorAll('.predio-row').forEach(row => {
      row.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        const uuid = btn.dataset.uuid;
        if (action === 'delete') deletePredio(uuid);
        if (action === 'visibility') {
          state.visibleParcelas[uuid] = !state.visibleParcelas[uuid];
          render();
        }
      });
    });
    // Módulos analíticos: M1 Lite · M2 Offline · Paquete (decisión Q2)
    $view().querySelectorAll('[data-module]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        const uuid = btn.dataset.uuid;
        if (btn.dataset.module === 'm1lite') setView('m1lite:' + uuid);
        if (btn.dataset.module === 'm2offline') setView('m2offline:' + uuid);
        if (btn.dataset.module === 'pack') exportOfflinePack(uuid);
      });
    });
    // Link para agregar otra zona del mapa (banner footer y header persistente)
    const goToMapzoneAdd = e => {
      if (e) e.preventDefault();
      state.mapzoneReturnView = null;
      state.view = 'mapzone:add';
      render();
    };
    if ($('#inbox-add-zone')) $('#inbox-add-zone').addEventListener('click', goToMapzoneAdd);
    if ($('#inbox-change-zone')) $('#inbox-change-zone').addEventListener('click', goToMapzoneAdd);
    if ($('#gps-add-zone')) $('#gps-add-zone').addEventListener('click', goToMapzoneAdd);
    if ($('#inbox-old-zone-link')) $('#inbox-old-zone-link').addEventListener('click', goToMapzoneAdd);
    if ($('#inbox-banner-close')) $('#inbox-banner-close').addEventListener('click', async () => {
      state.inboxBannerDismissed = true;
      try { await dbPut('config', { key: 'inboxBannerDismissed', value: true }); } catch (_) {}
      const banner = document.getElementById('inbox-offline-banner');
      if (banner) banner.remove();
    });

    // Alerta GPS · solo si permission ya está granted (no preguntar de nuevo)
    checkGpsInZoneAndAlert();
  }

  async function startNewPredio() {
    const sequence = state.predios.length + 1;
    const tmpl = state.sessionTemplate;
    state.draft = {
      predio_uuid: uuid4(),
      predio_codigo: generatePredioCodigo(state.extensionista, sequence),
      captured_at: null,
      captured_by: state.extensionista.nombre,
      device_id: state.extensionista.deviceId,
      pais: CONFIG.PAIS,
      sector: CONFIG.SECTOR,
      certificaciones: [],
      calidad_sca_base: CONFIG.SCA_DEFAULT,
      poligono: null,
      parcela_numero: sequence,
      parcela_nombre: null,
      nombre_parcela: null,
      // Herencia de sesión (F5a/b/e/f): campos del primer predio confirmado, todos editables
      nombre_productor: tmpl ? tmpl.nombre_productor : null,
      documento_identidad: tmpl ? tmpl.documento_identidad : null,
      email: tmpl ? tmpl.email : null,
      telefono_codigo_pais: tmpl ? tmpl.telefono_codigo_pais : '+51',
      telefono: tmpl ? tmpl.telefono : null,
      region: tmpl ? tmpl.region : null,
      provincia: tmpl ? tmpl.provincia : null,
      distrito_municipio: tmpl ? tmpl.distrito_municipio : null,
      variedad: tmpl ? tmpl.variedad : null,
      sistema_cultivo: tmpl ? tmpl.sistema_cultivo : null,
      canal_venta: tmpl ? tmpl.canal_venta : null
    };
    setView('step1');
  }

  // Q3: la descarga por predio y la masiva ahora producen el Paquete JSON unificado.
  // Se conservan los nombres exportPredio/exportAll para no romper referencias internas.
  async function exportPredio(uuid) {
    exportOfflinePack(uuid);
  }
  async function exportAll() {
    if (!state.predios.length) return;
    for (const p of state.predios) {
      exportOfflinePack(p.predio_uuid);
      // small delay to avoid browser blocking multiple downloads
      await new Promise(r => setTimeout(r, 200));
    }
    toast(`${state.predios.length} paquete(s) descargado(s)`);
  }
  async function deletePredio(uuid) {
    const p = state.predios.find(x => x.predio_uuid === uuid);
    if (!p) return;
    const ok = await confirmDialog({
      title: '¿Eliminar predio?',
      message: `Se eliminará <b>${p.nombre_finca || p.nombre_productor || p.predio_codigo}</b> de la bandeja. Asegúrate de haberlo exportado antes. Esta acción no se puede deshacer.`,
      confirm: 'Eliminar',
      cancel: 'Cancelar',
      danger: true
    });
    if (!ok) return;
    await dbDel('predios', uuid);
    state.predios = state.predios.filter(x => x.predio_uuid !== uuid);
    render();
    toast('Predio eliminado');
  }

  // ---- Form: Progress + helpers ----
  function progressBar(active) {
    const steps = [1,2,3,4];
    const html = steps.map(s => `<div class="progress-step ${s < active ? 'done' : ''} ${s === active ? 'active' : ''}"></div>`).join('');
    return `<div class="progress">${html}<span class="progress-text">${active}/4</span></div>`;
  }

  // ---- Step 1 — Identificación ----
  function viewStep1() {
    const d = state.draft;
    const prevDocs   = [...new Set(state.predios.map(p => p.documento_identidad).filter(Boolean))];
    const prevEmails = [...new Set(state.predios.map(p => p.email).filter(Boolean))];
    const prevTels   = [...new Set(state.predios.map(p => p.telefono).filter(Boolean))];
    const dlDocs   = prevDocs.map(v => `<option value="${v}">`).join('');
    const dlEmails = prevEmails.map(v => `<option value="${v}">`).join('');
    const dlTels   = prevTels.map(v => `<option value="${v}">`).join('');
    const numVal = d.parcela_numero != null ? d.parcela_numero : (state.predios.length + 1);
    const parcPreview = (() => {
      const n = numVal ? String(numVal).padStart(2, '0') : '';
      const nm = d.parcela_nombre || '';
      if (n && nm) return `${n} - ${nm}`;
      return n || nm || '—';
    })();
    $view().innerHTML = `
      ${progressBar(1)}
      <p class="h-kicker">Paso 1 de 4</p>
      <h1 class="h-title">Identificación</h1>
      <p class="h-sub">Quién es el productor y cómo contactarlo. Estos datos no salen de la plataforma B4B.</p>

      <datalist id="dl-doc">${dlDocs}</datalist>
      <datalist id="dl-email">${dlEmails}</datalist>
      <datalist id="dl-tel">${dlTels}</datalist>

      <div class="card">
        <div class="field">
          <label class="field-label" for="f-finca">Nombre de la finca<span class="req">*</span></label>
          <input class="input" id="f-finca" maxlength="120" value="${d.nombre_finca || ''}" placeholder="Ej. Finca La Esperanza">
        </div>
        <div class="field">
          <label class="field-label">Nombre parcela <span style="font-weight:400;color:var(--gray);font-size:11px">(opcional)</span></label>
          <div style="display:flex;gap:8px;align-items:center">
            <input class="input" id="f-parcela-num" type="number" min="1" max="99" step="1" inputmode="numeric" value="${numVal}" style="flex:0 0 68px;text-align:center">
            <input class="input" id="f-parcela-nombre" maxlength="80" value="${d.parcela_nombre || ''}" placeholder="Ej. Lote Sur" style="flex:1">
          </div>
          <p class="field-helper" id="f-parcela-preview">Vista: <b>${parcPreview}</b></p>
        </div>
        <div class="field">
          <label class="field-label" for="f-productor">Nombre del productor o productora<span class="req">*</span></label>
          <input class="input" id="f-productor" maxlength="120" value="${d.nombre_productor || ''}" placeholder="Ej. Pedro Quispe Mamani">
        </div>
        <div class="field">
          <label class="field-label" for="f-doc">Documento de identidad<span class="req">*</span></label>
          <input class="input" id="f-doc" maxlength="20" inputmode="numeric" value="${d.documento_identidad || ''}" placeholder="DNI / RUC / pasaporte" list="dl-doc">
          <p class="field-helper">Sirve para vincular varios predios a un mismo productor.</p>
        </div>
        <div class="field">
          <label class="field-label" for="f-email">Correo electrónico<span class="req">*</span></label>
          <input class="input" id="f-email" type="email" maxlength="150" value="${d.email || ''}" placeholder="productor@correo.com" list="dl-email">
        </div>
        <div class="field">
          <label class="field-label" for="f-telefono">Teléfono (opcional)</label>
          <div style="display: flex; gap: 8px;">
            <input class="input" id="f-telefono-codigo" maxlength="6" value="${d.telefono_codigo_pais || '+51'}" placeholder="+51" style="flex: 0 0 90px;">
            <input class="input" id="f-telefono" maxlength="20" value="${d.telefono || ''}" placeholder="999 888 777" style="flex: 1;" list="dl-tel">
          </div>
        </div>
      </div>

      <div class="card tight" style="background:var(--pale-navy);border-color:transparent">
        <div class="row gap-12">
          <div class="chip chip-neutral" style="font-family:monospace">${d.predio_codigo}</div>
          <span class="text-sm text-gray">Código generado automáticamente</span>
        </div>
      </div>
    `;
    setActionBar(`
      <button class="btn btn-secondary" id="step1-back">Cancelar</button>
      <button class="btn btn-primary" id="step1-next">Siguiente</button>
    `);
    $('#step1-back').addEventListener('click', cancelDraft);

    // Live preview del nombre parcela mientras el user escribe
    const updateParcPreview = () => {
      const n = parseInt($('#f-parcela-num').value, 10);
      const nm = $('#f-parcela-nombre').value.trim();
      const nStr = !isNaN(n) ? String(n).padStart(2, '0') : '';
      const prev = $('#f-parcela-preview');
      if (prev) prev.innerHTML = `Vista: <b>${nStr && nm ? nStr + ' - ' + nm : (nStr || nm || '—')}</b>`;
    };
    $('#f-parcela-num').addEventListener('input', updateParcPreview);
    $('#f-parcela-nombre').addEventListener('input', updateParcPreview);

    $('#step1-next').addEventListener('click', () => {
      const d = state.draft;
      d.nombre_finca = $('#f-finca').value.trim();
      d.nombre_productor = $('#f-productor').value.trim();
      d.documento_identidad = $('#f-doc').value.trim();
      d.email = $('#f-email').value.trim();
      d.telefono_codigo_pais = $('#f-telefono-codigo').value.trim() || '+51';
      d.telefono = $('#f-telefono').value.trim();
      const pNum = parseInt($('#f-parcela-num').value, 10);
      const pNom = $('#f-parcela-nombre').value.trim();
      d.parcela_numero = !isNaN(pNum) ? pNum : null;
      d.parcela_nombre = pNom || null;
      const nStr = d.parcela_numero != null ? String(d.parcela_numero).padStart(2, '0') : '';
      d.nombre_parcela = nStr && pNom ? `${nStr} - ${pNom}` : (nStr || pNom || null);
      const errs = [];
      if (!d.nombre_finca) errs.push('finca');
      if (!d.nombre_productor) errs.push('productor');
      if (!d.documento_identidad) errs.push('documento');
      if (!d.email) errs.push('email');
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email)) errs.push('email inválido');
      if (errs.length) { toast('Faltan campos: ' + errs.join(', ')); return; }
      setView('step2');
    });
  }

          <label class="field-label" for="f-distrito">Distrito / Municipio<span class="req">*</span></label>
          <select class="select" id="f-distrito" ${!d.provincia?'disabled':''}>
            <option value="">${d.provincia ? 'Elegir…' : 'Primero elige la provincia'}</option>
            ${distOpts}
          </select>
        </div>
      </div>

      <div class="card">
        <h3 class="h-section"><span class="step-num">📍</span>Coordenadas</h3>
        <div class="loc-options">

              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>

              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M9 4H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-3"/></svg>

    });

    $('#btn-gps').addEventListener('click', captureGps);

      $('#paste-block').classList.toggle('hidden');

      const errBox = $('#paste-error');
      errBox.classList.add('hidden'); errBox.textContent = '';
      if (!c) { errBox.classList.remove('hidden'); errBox.textContent = 'Formato no válido. Usá: -6.0621, -78.7739'; return; }
      if (!isInsidePeru(c.lat, c.lon)) {
        errBox.classList.remove('hidden');
        errBox.textContent = 'Esa ubicación no está en Perú. Verificá el orden (lat primero, lon después).';
        return;
      }
      state.draft.latitud = +c.lat.toFixed(6);
      state.draft.longitud = +c.lon.toFixed(6);
      state.draft.gps_capturado_at = Date.now();                                /* ofc_M8 G-M8-6=Q · timestamp para cache-validity ≤5min en modo trace */
      toast('Coordenadas guardadas');
      viewStep2();
    });

    if ($('#coord-clear')) {
      $('#coord-clear').addEventListener('click', () => {
        state.draft.latitud = null; state.draft.longitud = null;
        viewStep2();
      });
    }
    $('#btn-poly').addEventListener('click', () => setView('polygon'));
    if ($('#btn-poly-clear')) {
      $('#btn-poly-clear').addEventListener('click', async () => {
        const ok = await confirmDialog({ title: '¿Quitar polígono?', message: 'Solo quedará la coordenada del predio.', confirm: 'Quitar', danger: true });
        if (!ok) return;
        state.draft.poligono = null;
        viewStep2();
      });
    }
    $('#step2-back').addEventListener('click', () => setView('step1'));
    $('#step2-next').addEventListener('click', () => {
      const d = state.draft;
      const errs = [];
      if (!d.region) errs.push('región');
      if (!d.provincia) errs.push('provincia');
      if (!d.distrito_municipio) errs.push('distrito');
      if (d.latitud == null || d.longitud == null) errs.push('coordenadas');
      if (errs.length) { toast('Faltan: ' + errs.join(', ')); return; }
      setView('step3');
    });
  }

  function captureGps() {
    const errBox = $('#gps-error');
    if (errBox) { errBox.classList.add('hidden'); errBox.textContent = ''; }
    if (!navigator.geolocation) {
      errBox.classList.remove('hidden');
      errBox.innerHTML = '<div><b>GPS no disponible</b><br>Tu navegador no soporta geolocalización.</div>';
      return;
    }
    const btn = $('#btn-gps');
    if (btn) { btn.style.opacity='0.6'; btn.querySelector('.loc-btn-label').textContent = 'Ubicando…'; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        if (!isInsidePeru(lat, lon)) {
          if (errBox) {
            errBox.classList.remove('hidden');
            errBox.innerHTML = `<div><b>Fuera de Perú</b><br>Tu GPS marcó ${lat.toFixed(4)}, ${lon.toFixed(4)} — fuera del territorio peruano. Verificá tu ubicación o usá la opción manual.</div>`;
          }
          if (btn) { btn.style.opacity='1'; btn.querySelector('.loc-btn-label').textContent = 'Usar GPS'; }
          return;
        }
        state.draft.latitud = +lat.toFixed(6);
        state.draft.longitud = +lon.toFixed(6);
        state.draft.gps_capturado_at = Date.now();                              /* ofc_M8 G-M8-6=Q · timestamp para cache-validity ≤5min en modo trace */
        if (pos.coords.altitude != null && pos.coords.altitude !== 0) {
          state.draft.altitud_msnm = Math.round(pos.coords.altitude);
        }
        toast(`GPS: ${lat.toFixed(4)}, ${lon.toFixed(4)}`);
        viewStep2();
      },
      err => {
        if (btn) { btn.style.opacity='1'; btn.querySelector('.loc-btn-label').textContent = 'Usar GPS'; }
        const msgs = {
          1: 'Permiso de ubicación denegado. Activalo en los ajustes del navegador.',
          2: 'No se pudo obtener la ubicación. ¿GPS encendido? Prueba al aire libre.',
          3: 'GPS muy lento. Prueba de nuevo o usa la opción manual.'
        };
        if (errBox) {
          errBox.classList.remove('hidden');
          errBox.innerHTML = `<div><b>No pudimos ubicarte</b><br>${msgs[err.code] || err.message || 'Error desconocido'}</div>`;
        }
      },
      { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
    );
  }

  // ---- Step 3 — Cultivo ----
  function viewStep3() {
    const d = state.draft;
    const varOpts = CONFIG.VARIEDADES.map(v => `<option value="${v}" ${d.variedad===v?'selected':''}>${v}</option>`).join('');
    const sysOpts = CONFIG.SISTEMAS_CULTIVO.map(v => `<option value="${v}" ${d.sistema_cultivo===v?'selected':''}>${v}</option>`).join('');
    const polyAreaHa = (d.poligono && d.poligono.length >= 3) ? polygonAreaHa(d.poligono) : null;
    const areaCafeVal = d.area_cafe_ha != null ? d.area_cafe_ha : (polyAreaHa != null ? polyAreaHa.toFixed(2) : '');
    const areaCafeHelper = (d.area_cafe_ha == null && polyAreaHa != null) ? `<p class="field-helper">Calculado desde polígono trazado. Puedes editar.</p>` : '';
    $view().innerHTML = `
      ${progressBar(3)}
      <p class="h-kicker">Paso 3 de 4</p>
      <h1 class="h-title">Cultivo</h1>
      <p class="h-sub">Datos del cultivo actual. Alimentan los modelos de productividad y SAF.</p>

      <div class="card">
        <div class="row-2" style="margin-bottom:16px">
          <div class="field" style="margin:0">
            <label class="field-label">Sector</label>
            <input class="input" value="${CONFIG.SECTOR}" readonly style="background:var(--pale-green);border-color:var(--green);color:var(--green-dark);font-weight:600">
          </div>
          <div class="field" style="margin:0">
            <label class="field-label" for="f-variedad">Variedad<span class="req">*</span></label>
            <select class="select" id="f-variedad">
              <option value="">Elegir…</option>
              ${varOpts}
            </select>
          </div>
        </div>
        <div class="field">
          <label class="field-label" for="f-sistema">Sistema de cultivo actual<span class="req">*</span></label>
          <select class="select" id="f-sistema">
            <option value="">Elegir…</option>
            ${sysOpts}
          </select>
        </div>
      </div>

      <div class="card">
        <h3 class="h-section"><span class="step-num">ha</span>Áreas</h3>
        <div class="row-2" style="margin-bottom:16px">
          <div class="field" style="margin:0">
            <label class="field-label" for="f-atotal">Área total (ha)<span class="req">*</span></label>
            <input class="input" id="f-atotal" type="number" inputmode="decimal" min="0" step="0.01" value="${d.area_total_ha ?? ''}" placeholder="0.00">
          </div>
          <div class="field" style="margin:0">
            <label class="field-label" for="f-acafe">Área en café (ha)<span class="req">*</span></label>
            <input class="input" id="f-acafe" type="number" inputmode="decimal" min="0" step="0.01" value="${areaCafeVal}" placeholder="0.00">
            ${areaCafeHelper}
          </div>
        </div>
        <div id="area-error" class="field-error hidden"></div>
        <div class="field mb-0">
          <label class="field-label" for="f-prod">Productividad actual (kg/ha/año)<span class="req">*</span></label>
          <input class="input" id="f-prod" type="number" inputmode="numeric" min="0" step="1" value="${d.productividad_kg_ha_anio ?? ''}" placeholder="Ej. 800">
        </div>
      </div>
    `;
    setActionBar(`
      <button class="btn btn-secondary" id="step3-back">Atrás</button>
      <button class="btn btn-primary" id="step3-next">Siguiente</button>
    `);
    $('#f-variedad').addEventListener('change', e => state.draft.variedad = e.target.value);
    $('#f-sistema').addEventListener('change', e => state.draft.sistema_cultivo = e.target.value);

    // Restricción dura: el área en café NO puede superar al área total del predio.
    // Validación en tiempo real (input) y de bloqueo (next).
    function checkAreaConstraint() {
      const total = parseFloat($('#f-atotal').value);
      const cafe = parseFloat($('#f-acafe').value);
      const errBox = $('#area-error');
      const totalEl = $('#f-atotal');
      const cafeEl = $('#f-acafe');
      const invalid = !isNaN(total) && !isNaN(cafe) && cafe > total;
      errBox.classList.toggle('hidden', !invalid);
      totalEl.classList.toggle('error', invalid);
      cafeEl.classList.toggle('error', invalid);
      if (invalid) {
        errBox.textContent = `El área en café (${cafe} ha) no puede ser mayor que el área total del predio (${total} ha).`;
      }
      return !invalid;
    }
    $('#f-atotal').addEventListener('input', checkAreaConstraint);
    $('#f-acafe').addEventListener('input', checkAreaConstraint);

    $('#step3-back').addEventListener('click', () => setView('step2'));
    $('#step3-next').addEventListener('click', () => {
      const d = state.draft;
      d.area_total_ha = parseFloat($('#f-atotal').value) || null;
      d.area_cafe_ha = parseFloat($('#f-acafe').value) || null;
      d.productividad_kg_ha_anio = parseInt($('#f-prod').value, 10) || null;

      const errs = [];
      if (!d.variedad) errs.push('variedad');
      if (!d.sistema_cultivo) errs.push('sistema');
      if (d.area_total_ha == null || d.area_total_ha <= 0) errs.push('área total');
      if (d.area_cafe_ha == null || d.area_cafe_ha <= 0) errs.push('área café');
      if (d.productividad_kg_ha_anio == null || d.productividad_kg_ha_anio < 0) errs.push('productividad');

      // Bloqueo: el café no puede superar al total.
      if (!checkAreaConstraint()) {
        toast('Revisá las áreas: el café no puede superar al total');
        return;
      }

      if (errs.length) { toast('Faltan: ' + errs.join(', ')); return; }
      setView('step4');
    });
  }

  // ---- Step 4 — Certificaciones ----
  function viewStep4() {
    const d = state.draft;
    const certBoxes = CONFIG.CERTIFICACIONES.map(c => {
      const checked = d.certificaciones?.includes(c);
      return `
        <div class="check-item ${checked?'checked':''}" data-cert="${c}">
          <input type="checkbox" ${checked?'checked':''}>
          <label>${c}</label>
        </div>`;
    }).join('');

    const canalOpts = CONFIG.CANALES_VENTA.map(v => `<option value="${v}" ${d.canal_venta===v?'selected':''}>${v}</option>`).join('');

    $view().innerHTML = `
      ${progressBar(4)}
      <p class="h-kicker">Paso 4 de 4</p>
      <h1 class="h-title">Certificaciones y calidad</h1>
      <p class="h-sub">Marcá todas las que aplican. La calidad SCA es input crítico del modelo.</p>

      <div class="card">
        <h3 class="h-section"><span class="step-num">✓</span>Certificaciones actuales</h3>
        <div class="check-list">${certBoxes}</div>
      </div>

      <div class="card">
        <div class="field">
          <label class="field-label" for="f-sca">Calidad SCA base (60-95)<span class="req">*</span></label>
          <input class="input" id="f-sca" type="number" inputmode="numeric" min="${CONFIG.SCA_MIN}" max="${CONFIG.SCA_MAX}" step="1" value="${d.calidad_sca_base ?? CONFIG.SCA_DEFAULT}">
          <p class="field-helper">Si no la conoces, deja <b>${CONFIG.SCA_DEFAULT}</b> por defecto.</p>
        </div>
        <div class="field mb-0">
          <label class="field-label" for="f-canal">Canal de venta<span class="req">*</span></label>
          <select class="select" id="f-canal">
            <option value="">Elegir…</option>
            ${canalOpts}
          </select>
        </div>
      </div>
    `;
    setActionBar(`
      <button class="btn btn-secondary" id="step4-back">Atrás</button>
      <button class="btn btn-primary" id="step4-next">Revisar</button>
    `);

    $view().querySelectorAll('.check-item').forEach(item => {
      item.addEventListener('click', () => {
        const cert = item.dataset.cert;
        const cb = item.querySelector('input');
        const newState = !cb.checked;
        cb.checked = newState;
        item.classList.toggle('checked', newState);
        if (!state.draft.certificaciones) state.draft.certificaciones = [];
        if (newState && cert === 'Ninguna') {
          state.draft.certificaciones = ['Ninguna'];
          $view().querySelectorAll('.check-item').forEach(other => {
            if (other !== item) { other.querySelector('input').checked = false; other.classList.remove('checked'); }
          });
        } else if (newState) {
          state.draft.certificaciones = state.draft.certificaciones.filter(x => x !== 'Ninguna');
          const ningunaItem = [...$view().querySelectorAll('.check-item')].find(x => x.dataset.cert === 'Ninguna');
          if (ningunaItem) { ningunaItem.querySelector('input').checked = false; ningunaItem.classList.remove('checked'); }
          if (!state.draft.certificaciones.includes(cert)) state.draft.certificaciones.push(cert);
        } else {
          state.draft.certificaciones = state.draft.certificaciones.filter(x => x !== cert);
        }
      });
    });
    $('#f-canal').addEventListener('change', e => state.draft.canal_venta = e.target.value);
    $('#step4-back').addEventListener('click', () => setView('step3'));
    $('#step4-next').addEventListener('click', () => {
      const d = state.draft;
      const sca = parseInt($('#f-sca').value, 10);
      if (isNaN(sca) || sca < CONFIG.SCA_MIN || sca > CONFIG.SCA_MAX) {
        toast(`SCA debe estar entre ${CONFIG.SCA_MIN} y ${CONFIG.SCA_MAX}`); return;
      }
      d.calidad_sca_base = sca;
      if (!d.canal_venta) { toast('Elige un canal de venta'); return; }
      setView('summary');
    });
  }

  function ensureM2Choices(predio) {
    const sim = ensureM2Sim(predio);
    sim.choices = Object.assign({
      apis: { scenario: scenarioFromValue('apis', sim.apisDensity), note: '' },
      meliponas: { scenario: scenarioFromValue('meliponas', sim.melipBoxes), note: '' },
      saf: { scenario: scenarioFromSaf(sim.safDensity, sim.safShade), note: '' },
      certificacion: { scenario: scenarioFromValue('certificacion', sim.certPct), note: '' }
    }, sim.choices || {});
    if (sim.choices.melip && !sim.choices.meliponas) {
      sim.choices.meliponas = sim.choices.melip;
      delete sim.choices.melip;
    }
    if (sim.choices.cert && !sim.choices.certificacion) {
      sim.choices.certificacion = sim.choices.cert;
      delete sim.choices.cert;
    }
  }
  function strategySection(key, predio) {
    const data = M2_PEDAGOGY[key];
    const sim = ensureM2Sim(predio);
    const choice = (sim.choices && sim.choices[key]) || { scenario: 'recommended' };
    const selected = choice.scenario || 'recommended';
    const option = data.options.find(o => o.id === selected) || data.options[0];
    const controls = key === 'saf'
      ? offSlider('safDensity','Árboles SAF', sim.safDensity, 0, 250, 10, 'árb/ha') + offSlider('safShade','Sombra SAF', sim.safShade, 0, 70, 5, '%')
      : key === 'apis'
        ? offSlider('apisDensity','Colmenas Apis', sim.apisDensity, 0, 8, .5, 'col/ha')
        : key === 'meliponas'
          ? offSlider('melipBoxes','Cajas meliponas', sim.melipBoxes, 0, 10, 1, 'cajas/ha')
          : offSlider('certPct','Área certificada', sim.certPct, 0, 100, 10, '%');
    return `

        <h2 class="h-section">${data.title}</h2>

        </div>

          <select class="select" data-choice="${key}">

          <p class="hint" style="margin-top:6px">${option.note}</p>

        ${controls}

  function applyStrategyChoice(predio, key, scenarioId) {
    const sim = ensureM2Sim(predio);
    ensureM2Choices(predio);
    const data = M2_PEDAGOGY[key];
    const option = data.options.find(o => o.id === scenarioId) || data.options[0];
    sim.choices[key] = {
      scenario: option.id,
      label: option.label,
      note: option.note,
      selected_at: new Date().toISOString()
    };
    if (key === 'apis') sim.apisDensity = option.value;
    if (key === 'meliponas') sim.melipBoxes = option.value;
    if (key === 'certificacion') sim.certPct = option.value;
    if (key === 'saf') {
      sim.safDensity = option.density;
      sim.safShade = option.shade;
    }
  }
  function syncChoiceFromSlider(predio, sliderKey) {
    const sim = ensureM2Sim(predio);
    ensureM2Choices(predio);
    if (sliderKey === 'apisDensity') setChoiceMeta(sim, 'apis', scenarioFromValue('apis', sim.apisDensity));
    if (sliderKey === 'melipBoxes') setChoiceMeta(sim, 'meliponas', scenarioFromValue('meliponas', sim.melipBoxes));
    if (sliderKey === 'certPct') setChoiceMeta(sim, 'certificacion', scenarioFromValue('certificacion', sim.certPct));
    if (sliderKey === 'safDensity' || sliderKey === 'safShade') setChoiceMeta(sim, 'saf', scenarioFromSaf(sim.safDensity, sim.safShade));
  }
  function setChoiceMeta(sim, key, scenarioId) {
    const opt = M2_PEDAGOGY[key].options.find(o => o.id === scenarioId) || M2_PEDAGOGY[key].options[0];
    sim.choices[key] = {
      scenario: opt.id,
      label: opt.label,
      note: opt.note,
      selected_at: new Date().toISOString()
    };
  }
  function buildM3Preload(predio) {
    const sim = ensureM2Sim(predio);
    ensureM2Choices(predio);
    const enabled = normalizeM3Enabled(sim.enabled);
    const choices = sim.choices || {};
    const activeFromScenario = key => !!(choices[key] && choices[key].scenario !== 'none');
    return {
      source: 'B4BLite_Offline',
      schema: 'm3_preload_v1',
      estrategias: {
        apis: {
          activo: enabled.apis && activeFromScenario('apis'),
          escenario: choices.apis?.scenario || 'none',
          etiqueta: choices.apis?.label || '',
          valor: Number(sim.apisDensity || 0),
          unidad: 'colmenas_ha'
        },
        meliponas: {
          activo: enabled.meliponas && activeFromScenario('meliponas'),
          escenario: choices.meliponas?.scenario || 'none',
          etiqueta: choices.meliponas?.label || '',
          valor: Number(sim.melipBoxes || 0),
          unidad: 'cajas_ha'
        },
        saf: {
          activo: enabled.saf && activeFromScenario('saf'),
          escenario: choices.saf?.scenario || 'none',
          etiqueta: choices.saf?.label || '',
          arboles_ha: Number(sim.safDensity || 0),
          sombra_pct: Number(sim.safShade || 0),
          arquetipo: Number(sim.safArchetype || 2)
        },
        certificacion: {
          activo: enabled.certificacion && activeFromScenario('certificacion'),
          escenario: choices.certificacion?.scenario || 'none',
          etiqueta: choices.certificacion?.label || '',
          porcentaje_finca: Number(sim.certPct || 0),
          unidad: 'pct_finca'
        }
      },
      sim_state: {
        apisDensity: Number(sim.apisDensity || 0),
        melipBoxes: Number(sim.melipBoxes || 0),
        safDensity: Number(sim.safDensity || 0),
        safShade: Number(sim.safShade || 0),
        safArchetype: Number(sim.safArchetype || 2),
        certPct: Number(sim.certPct || 0),
        enabled
      }
    };
  }
  function scenarioFromValue(key, value) {
    value = Number(value || 0);
    if (value <= 0) return 'none';
    if (key === 'certificacion') {
      if (value < 55) return 'pilot';
      if (value < 90) return 'recommended';
      return 'ambitious';
    }
    if (value <= 2) return 'pilot';
    if (value <= 5) return 'recommended';
    return 'ambitious';
  }
  function scenarioFromSaf(density, shade) {
    density = Number(density || 0);
    shade = Number(shade || 0);
    if (density <= 0 && shade <= 0) return 'none';
    if (density < 95 || shade < 30) return 'pilot';
    if (density < 160 || shade < 45) return 'recommended';
    return 'ambitious';
  }
  function offKpi(label, value, sub) {
    return `<article class="m2-kpi"><span>${label}</span><strong>${value}</strong><small>${sub}</small></article>`;
  }
  function offSlider(key, label, value, min, max, step, unit) {
    return `<label class="m2-slider"><span class="m2-slider-head"><strong>${label}</strong><em>${value} ${unit}</em></span><input type="range" min="${min}" max="${max}" step="${step}" value="${value}" data-m2-slider="${key}"></label>`;
  }
  function offOpp(letter, title, body) {
    return `<article class="opp-row"><div class="opp-icon">${letter}</div><div><strong>${title}</strong><p>${body}</p></div></article>`;
  }
  function exportOfflinePack(uuid) {
    const p = getPredio(uuid);
    if (!p) return;
    ensureM2Choices(p);
    const inp = offInputs(p);
    const m3Preload = buildM3Preload(p);
    // Adjuntar polígono como GeoJSON dentro del payload para que screens-01-auth lo lea directo
    const geojson = (p.poligono && p.poligono.length) ? buildGeoJson(p) : null;
    const payload = {
      schema: 'b4blite_offline_m0_m1lite_m2_v1',
      exported_at: new Date().toISOString(),
      predio: p,
      geojson: geojson,
      m1_lite: {
        status: 'pendiente_analisis_satelital',
        nota: 'M1 Lite fue generado offline. Habitat, buffers, multitemporal y frameworks requieren conexion.'
      },
      m2_offline: {
        family_choices: ensureM2Sim(p).choices,
        next_meeting_message: 'Estas elecciones se correrán en B4B para preparar un reporte de beneficios económicos y para la naturaleza en la siguiente reunión.',
        inputs: inp,
        scenario: offScenario(inp),
        savings: offSavings(inp),
        cashflow: offCashflow(inp)
      },
      m3_preload: m3Preload
    };
    downloadBlob(`${p.predio_codigo || 'b4blite'}-B4BLite_Offline.json`, JSON.stringify(payload, null, 2), 'application/json');
    toast('Paquete B4BLite_Offline descargado');
  }

  function render() {
    $view().className = 'view';
    if (state.view === 'loading') { $view().innerHTML = '<div class="empty"><p>Cargando…</p></div>'; clearActionBar(); return; }
    if (state.view === 'setup') return viewSetup();
    if (state.view === 'inbox') return viewInbox();
    if (state.view === 'step1') return viewStep1();
    if (state.view === 'step2') return viewStep2();
    if (state.view === 'step3') return viewStep3();
    if (state.view === 'step4') return viewStep4();
    if (state.view === 'summary') return viewSummary();
    /* ofc_M8 G-M8-3=G · selector dentro del Step Polígono · 'polygon' invoca modal y delega a 'walk' o 'trace' */
    if (state.view === 'polygon') {
      showModeSelector(mode => {
        state.draft.mode = mode;
        setView(mode);
      });
      return;
    }
    if (state.view === 'walk')  return viewWalkMode();
    if (state.view === 'trace') return viewTraceMode();
    /* B4BLite · módulos analíticos accesibles desde la inbox */
    if (state.view && state.view.indexOf('m1lite:') === 0) return viewM1Lite(state.view.split(':')[1]);
    if (state.view && state.view.indexOf('m2offline:') === 0) return viewM2Offline(state.view.split(':')[1]);
    /* mapZone · pre-descarga proactiva de tiles por región/provincia */
    if (state.view === 'mapzone' || state.view === 'mapzone:add' || state.view === 'mapzone:advanced') return viewMapZone();
    /* Debug · viewMapTest sigue visible para testing de bbox/tiles (decisión Daniel) */
    if (state.view === 'maptest') return viewMapTest();
  }

  // ============================================================
  // BOOT
  // ============================================================
  // Read user info passed by the B4B platform via URL params.
  // Contract: ?user=<encoded full name>&ext=<optional org code>
  function readUserFromUrl() {
    try {
      const p = new URLSearchParams(window.location.search);
      const u = (p.get('user') || '').trim();
      const e = (p.get('ext') || '').trim();
      return { user: u, ext: e };
    } catch (_) { return { user: '', ext: '' }; }
  }

  async function boot() {
    // ?mode=dev → extiende bbox a Perú+Colombia para revisiones en desarrollo
    if (new URLSearchParams(window.location.search).get('mode') === 'dev') {
      CONFIG.BBOX_MODE = 'peruColombia';
    }
    // Render loading state immediately so user sees feedback even if storage is slow.
    $view().innerHTML = '<div class="empty" style="padding-top:60px"><div class="empty-icon"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><h2 class="empty-title">Cargando…</h2><p class="empty-sub">Preparando almacenamiento local.</p></div>';
    try {
      const fromUrl = readUserFromUrl();
      let ext = await dbGet('config', 'extensionista');
      ext = ext && ext.value ? ext.value : null;
      state.predios = await dbAll('predios');

      // If we have no saved data AND no URL params, show the setup screen.
      const haveAnyIdentity = (ext && ext.nombre && ext.codigo) || fromUrl.user;
      if (!haveAnyIdentity) {
        if (!ext) state.extensionista = { nombre: '', codigo: '', deviceId: uuid4() };
        else state.extensionista = ext;
        setView('setup');
        return;
      }

      // Build the active extensionista: URL params take precedence (latest from platform).
      const nombre = fromUrl.user || (ext && ext.nombre) || 'Extensionista de campo';
      const codigo = fromUrl.ext || (ext && ext.codigo) || '';
      const deviceId = (ext && ext.deviceId) || uuid4();

      state.extensionista = { nombre, codigo, deviceId };
      await dbPut('config', { key: 'extensionista', value: state.extensionista });

      /* Q4 · Debug · acceso a viewMapTest vía URL ?debug=maptest */
      const debugParam = new URLSearchParams(window.location.search).get('debug');
      if (debugParam === 'maptest') {
        setView('maptest');
        return;
      }

      /* mapZone · cargar info de zona descargada para mostrar en inbox header */
      
      try {
        const z = await dbGet('config', 'mapZone');
        if (z && z.value) state.cachedMapZone = z.value;
      } catch (_) {}

  // ============================================================
  // WAKE LOCK · mantiene pantalla encendida durante descarga de tiles
  // Soportado en Chrome Android (2020+), Safari iOS 16.4+ (2023+). Falla silenciosa si no.
  // ============================================================
  let _wakeLock = null;
  async function acquireWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', () => { _wakeLock = null; });
    } catch (e) {
      console.warn('[wakeLock] no se pudo adquirir:', e);
    }
  }
  function releaseWakeLock() {
    if (_wakeLock) {
      _wakeLock.release().catch(() => {});
      _wakeLock = null;
    }
  }
  // Re-adquirir wake lock si el usuario vuelve a la pestaña durante descarga
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && state.isDownloadingTiles && !_wakeLock) {
      await acquireWakeLock();
    }
  });

    // ============================================================
  // VIEW MAP ZONE · pre-descarga proactiva de tiles por región/provincia/distritos
  // Funciones: buildBboxFromCentroid, geocodeZone (Nominatim + fallback),
  //   unionBboxes, runZoneDownload, viewMapZone, overlay de progreso.
  // ============================================================
  function buildBboxFromCentroid(lat, lon, radiusKm) {
    const dLat = radiusKm / 111;
    const dLon = radiusKm / (111 * Math.cos(lat * Math.PI / 180));
    return {
      latMin: lat - dLat, latMax: lat + dLat,
      lonMin: lon - dLon, lonMax: lon + dLon
    };
  }
  async function geocodeZone(query, fallbackRegion, fallbackRadiusKm) {
    try {
      const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=pe&q=' + encodeURIComponent(query);
      const r = await fetch(url, { headers: { 'Accept-Language': 'es' } });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const arr = await r.json();
      if (!arr.length || !arr[0].boundingbox) throw new Error('no results');
      // Nominatim boundingbox = [latMin, latMax, lonMin, lonMax] como strings
      const bb = arr[0].boundingbox.map(Number);
      return { latMin: bb[0], latMax: bb[1], lonMin: bb[2], lonMax: bb[3], source: 'nominatim' };
    } catch (err) {
      console.warn('[geocodeZone] fallback to centroid for:', query, err);
      const c = PERU_CENTROIDES[fallbackRegion] || PERU_CENTROIDES['Cajamarca'];
      return Object.assign(buildBboxFromCentroid(c.lat, c.lon, fallbackRadiusKm), { source: 'centroide' });
    }
  }
  function unionBboxes(bboxes) {
    return {
      latMin: Math.min.apply(null, bboxes.map(b => b.latMin)),
      latMax: Math.max.apply(null, bboxes.map(b => b.latMax)),
      lonMin: Math.min.apply(null, bboxes.map(b => b.lonMin)),
      lonMax: Math.max.apply(null, bboxes.map(b => b.lonMax))
    };
  }
  // Pre-cachea capa base panorámica de Perú (z5-z10, ~62 MB, ~5 min). Idempotente.
  // Chequea sample tiles en z5 Y z10 para detectar capas base parciales (versiones viejas).
  async function precacheBaseLayer() {
    const s5 = latLngToTile(-9.0, -75.0, 5);
    const s10 = latLngToTile(-9.0, -75.0, 10);
    const key5 = state.mapProvider + '/5/' + s5.x + '/' + s5.y;
    const key10 = state.mapProvider + '/10/' + s10.x + '/' + s10.y;
    try {
      const has5 = await dbGet('tiles', key5);
      const has10 = await dbGet('tiles', key10);
      if ((has5 instanceof Blob) && (has10 instanceof Blob)) {
        return { done: 0, total: 0, skipped: true };
      }
    } catch (_) {}
    return await cacheTilesForBbox(CONFIG.PERU_BBOX, { zMin: 5, zMax: 10 });
  }

  async function runZoneDownload(sel) {
    const ZONE_ZOOM = { zMin: 11, zMax: 16 };
    const tieneDistritos = !!(sel.distritos && sel.distritos.length > 0);
    const tienePrecisionZones = !!(sel.precisionZones && sel.precisionZones.length > 0);
    if (!tieneDistritos && !tienePrecisionZones) {
      throw new Error('No se seleccionaron distritos ni zonas de precisión');
    }
    // Pre-check capa base · si ya está, saltamos Fase 1 completamente
    let baseDone = false;
    try {
      const s5 = latLngToTile(-9.0, -75.0, 5);
      const s10 = latLngToTile(-9.0, -75.0, 10);
      const has5 = await dbGet('tiles', state.mapProvider + '/5/' + s5.x + '/' + s5.y);
      const has10 = await dbGet('tiles', state.mapProvider + '/10/' + s10.x + '/' + s10.y);
      baseDone = (has5 instanceof Blob) && (has10 instanceof Blob);
    } catch (_) {}
    // Cuenta de fases dinámica (base solo si falta, distritos si hay, precision si hay)
    const phases = [];
    // Base solo si hay distritos · si solo hay zonas de precisión, no la necesitamos
    if (!baseDone && tieneDistritos) phases.push('base');
    if (tieneDistritos) phases.push('distritos');
    if (tienePrecisionZones) phases.push('precision');
    const totalPhases = phases.length;
    let phaseIdx = 0;
    const combinedResult = { done: 0, total: 0, errors: 0 };

    // FASE base
    if (phases.indexOf('base') >= 0) {
      phaseIdx++;
      window.dispatchEvent(new CustomEvent('recorder:phaseChange', {
        detail: { phase: phaseIdx, total: totalPhases, label: 'Capa base de Perú (vista panorámica)' }
      }));
      const r = await precacheBaseLayer();
      combinedResult.done += r.done || 0;
      combinedResult.total += r.total || 0;
      combinedResult.errors += r.errors || 0;
    }
    // FASE distritos
    let totalBbox = null;
    if (tieneDistritos) {
      phaseIdx++;
      window.dispatchEvent(new CustomEvent('recorder:phaseChange', {
        detail: { phase: phaseIdx, total: totalPhases, label: 'Detalle de tus distritos (' + sel.distritos.length + ' seleccionado' + (sel.distritos.length>1?'s':'') + ')' }
      }));
      const bboxes = [];
      for (let i = 0; i < sel.distritos.length; i++) {
        if (i > 0) await new Promise(r => setTimeout(r, 1100));
        const d = sel.distritos[i];
        const dBbox = await geocodeZone(d + ', ' + sel.provincia + ', ' + sel.region + ', Peru', sel.region, 8);
        bboxes.push(dBbox);
      }
      totalBbox = unionBboxes(bboxes);
      const r = await cacheTilesForBbox(totalBbox, ZONE_ZOOM);
      combinedResult.done += r.done || 0;
      combinedResult.total += r.total || 0;
      combinedResult.errors += r.errors || 0;
    }
    // FASE zonas de alta precisión · siempre en sat (Esri) para ver bordes de cafetal
    if (tienePrecisionZones) {
      phaseIdx++;
      const nz = sel.precisionZones.length;
      const provChoice = sel.tileProvider || 'sat';
      const provPhaseLabel = provChoice === 'both' ? 'satelital + callejero' : provChoice === 'osm' ? 'callejero' : 'satelital';
      window.dispatchEvent(new CustomEvent('recorder:phaseChange', {
        detail: { phase: phaseIdx, total: totalPhases, label: nz + ' zona' + (nz>1?'s':'') + ' de alta precisión (' + provPhaseLabel + ')' }
      }));
      const provList = provChoice === 'both' ? ['sat', 'osm'] : [provChoice];
      for (const z of sel.precisionZones) {
        const zBbox = buildBboxFromCentroid(z.lat, z.lng, z.radiusKm);
        for (var pi = 0; pi < provList.length; pi++) {
          const r = await cacheTilesForBbox(zBbox, { zMin: 11, zMax: z.zMax }, provList[pi]);
          combinedResult.done += r.done || 0;
          combinedResult.total += r.total || 0;
          combinedResult.errors += r.errors || 0;
        }
      }
    }
    // Persistir mapZone con bbox principal + zonas
    const persistBbox = totalBbox || (tienePrecisionZones
      ? buildBboxFromCentroid(sel.precisionZones[0].lat, sel.precisionZones[0].lng, sel.precisionZones[0].radiusKm)
      : null);
    
      // Si append es true (modo aditivo), las precisionZones nuevas se suman a las previas
    let mergedPrecisionZones = (sel.precisionZones || []).map(z => ({
      id: z.id, name: z.name, lat: z.lat, lng: z.lng, radiusKm: z.radiusKm, zMax: z.zMax,
      bbox: buildBboxFromCentroid(z.lat, z.lng, z.radiusKm)
    }));
    if (sel.append && state.cachedMapZone && Array.isArray(state.cachedMapZone.precisionZones)) {
      mergedPrecisionZones = state.cachedMapZone.precisionZones.concat(mergedPrecisionZones);
    }
    await dbPut('config', {
      key: 'mapZone',
      value: {
        region: sel.region || (state.cachedMapZone ? state.cachedMapZone.region : null),
        provincia: sel.provincia || (state.cachedMapZone ? state.cachedMapZone.provincia : null),
        distritos: sel.distritos && sel.distritos.length ? sel.distritos : (state.cachedMapZone ? (state.cachedMapZone.distritos || []) : []),
        precisionZones: mergedPrecisionZones,
        bbox: persistBbox,
        tiles_total: combinedResult.done,
        downloaded_at: new Date().toISOString()
      }
    });

    state.cachedMapZone = (await dbGet('config', 'mapZone')).value;
    return combinedResult;
  }

            cancel: 'Volver y agregar zona'
          });
          try { localStorage.setItem('precisionZonesWarningShown', '1'); } catch(_){}
          if (!cont) return;
        }
      }
      $download.disabled = true;
      state.isDownloadingTiles = true;
      await acquireWakeLock();
      showZoneProgressOverlay();
      try {
        const result = await runZoneDownload({
          region: region || null,
          provincia: provincia || null,
          distritos: distritos,
          precisionZones: precisionZones.slice()
        });
        hideZoneProgressOverlay();
        releaseWakeLock();
        state.isDownloadingTiles = false;
        showDownloadSuccessModal(result);
      } catch (err) {
        hideZoneProgressOverlay();
        releaseWakeLock();
        state.isDownloadingTiles = false;
        $download.disabled = false;
        console.error('[runZoneDownload] error:', err);
        toast('Error en la descarga · revisa tu conexión');
      }
    });

    // ============ Zonas de alta precisión · helpers, render, modal ============
    function escapeHtmlPz(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function estimatePrecisionZoneTiles(radiusKm, zMax) {
      // Aproximación: bbox cuadrado de lado 2*radiusKm centrado en lat=-9 (Perú central)
      const centroLat = -9.0;
      const dLat = radiusKm / 111;
      const dLon = radiusKm / (111 * Math.cos(centroLat * Math.PI / 180));
      const bbox = { latMin: centroLat - dLat, latMax: centroLat + dLat,
                     lonMin: -75 - dLon,       lonMax: -75 + dLon };
      return countTilesInBbox(bbox, 11, zMax);
    }
    function renderPrecisionZones() {
      const $list = $('#precision-zones-list');
      const $empty = $('#precision-zones-empty');
      const $addBtn = $('#precision-zone-add-btn');
      const $headerSub = $('#precision-zones-header-sub');
      if (!$list) return;
      if (precisionZones.length === 0) {
        $list.innerHTML = '';
        if ($empty) $empty.style.display = 'block';
        if ($headerSub) $headerSub.textContent = 'Si conocés el predio exacto, agregá una zona con zoom hasta z18 para ver bordes con claridad.';
      } else {
        if ($empty) $empty.style.display = 'none';
        $list.innerHTML = precisionZones.map(z => {
          const tiles = estimatePrecisionZoneTiles(z.radiusKm, z.zMax);
          const mb = (tiles * 20 / 1024).toFixed(1);
          return '<div class="precision-zone-item" data-id="' + z.id + '">' +
                   '<div class="precision-zone-item-info">' +
                     '<p class="precision-zone-item-name">' + escapeHtmlPz(z.name) + '</p>' +
                     '<p class="precision-zone-item-meta">' + z.lat.toFixed(4) + ', ' + z.lng.toFixed(4) +
                       ' · radio ' + z.radiusKm + ' km · z11–' + z.zMax +
                       ' · ~' + tiles.toLocaleString('es-PE') + ' tiles · ~' + mb + ' MB</p>' +
                   '</div>' +
                   '<button class="precision-zone-item-remove" data-remove="' + z.id + '" aria-label="Quitar zona">×</button>' +
                 '</div>';
        }).join('');
        $list.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = parseInt(btn.getAttribute('data-remove'), 10);
            const idx = precisionZones.findIndex(z => z.id === id);
            if (idx >= 0) precisionZones.splice(idx, 1);
            renderPrecisionZones();
            updateSummary();
          });
        });
        if ($headerSub) {
          $headerSub.textContent = precisionZones.length + ' zona' + (precisionZones.length>1?'s':'') + ' agregada' + (precisionZones.length>1?'s':'') + '. Toca para administrarlas.';
        }
      }
      if ($addBtn) $addBtn.disabled = precisionZones.length >= MAX_PRECISION_ZONES;
    }

    // Toggle acordeón
    const $pzHeader = $('#precision-zones-header');
    const $pzCard = $('#precision-zones-card');
    if ($pzHeader && $pzCard) {
      $pzHeader.addEventListener('click', () => {
        $pzCard.classList.toggle('open');
        $pzHeader.setAttribute('aria-expanded', $pzCard.classList.contains('open') ? 'true' : 'false');
      });
    }
    // Botón + Agregar
    const $pzAddBtn = $('#precision-zone-add-btn');
    if ($pzAddBtn) $pzAddBtn.addEventListener('click', () => openAddZoneModal());

    function openAddZoneModal() {
      if (precisionZones.length >= MAX_PRECISION_ZONES) {

        return;
      }
      const modal = document.createElement('div');
      modal.className = 'zone-add-modal';
      modal.id = 'zone-add-modal';

      ).join('');
      const zoomBtns = PRECISION_ZONE_ZMAX_OPTIONS.map(z =>
        '<button class="zone-add-zoom-btn ' + (z===18?'active':'') + '" data-zmax="' + z + '">z' + z + '</button>'
      ).join('');
      modal.innerHTML =
        '<div class="zone-add-content">' +
          '<h3>Agregar zona de alta precisión</h3>' +
          '<p class="zone-add-sub">Definí el centro del predio. Solo podés hacerlo ahora con internet.</p>' +
          '<div class="zone-add-method-tabs">' +
            '<button class="zone-add-method-tab" data-method="map">Tap en mapa</button>' +

            '<p style="font-size: 11px; color: var(--gray); margin: 6px 0 0; line-height: 1.4;">z17 da ~30 cm/pixel, z18 da ~15 cm/pixel. A mayor zoom, más tiles para descargar.</p>' +

          '</div>' +
        '</div>';
      document.body.appendChild(modal);
      const modalState = { method: 'map', lat: null, lng: null, radiusKm: 5, zMax: 18, miniMap: null, miniMarker: null };

      function setMethod(m) {
        modalState.method = m;

          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              pos => {

                updateEstimate();

              err => {
                const status = modal.querySelector('#zone-add-gps-status');
                if (status) status.textContent = 'No se pudo obtener ubicación: ' + (err.message || err.code);

        }
        updateEstimate();
      }
      function initMiniMap() {
        const el = modal.querySelector('#zone-add-mini-map');
        if (!el || !window.L) return;
        const m = L.map(el, { zoomControl: true, attributionControl: false, maxZoom: OVERRIDE_ZOOM_CAP });
        const tl = getTileLayer('sat', { maxZoom: 18 });
        tl.addTo(m);
        m.setView([-9.0, -75.0], 6);
        m.on('click', e => {
          modalState.lat = e.latlng.lat;
          modalState.lng = e.latlng.lng;
          if (modalState.miniMarker) m.removeLayer(modalState.miniMarker);
          modalState.miniMarker = L.marker(e.latlng).addTo(m);
          updateEstimate();
        });
        modalState.miniMap = m;
      }
      function updateFromCoords() {
        const lat = parseFloat(modal.querySelector('#zone-add-lat').value);
        const lng = parseFloat(modal.querySelector('#zone-add-lng').value);
        if (isFinite(lat) && isFinite(lng) && lat>=-90 && lat<=90 && lng>=-180 && lng<=180) {
          modalState.lat = lat; modalState.lng = lng;
        } else {
          modalState.lat = null; modalState.lng = null;
        }
        updateEstimate();
      }
      function updateEstimate() {
        const est = modal.querySelector('#zone-add-estimate');
        const confirmBtn = modal.querySelector('#zone-add-confirm');
        if (!est) return;
        if (modalState.lat == null || modalState.lng == null) {
          est.innerHTML = 'Define el centro para calcular el estimado.';
          if (confirmBtn) confirmBtn.disabled = true;
          return;
        }
        const tiles = estimatePrecisionZoneTiles(modalState.radiusKm, modalState.zMax);
        const mb = (tiles * 20 / 1024).toFixed(1);
        const minEst = Math.max(1, Math.round(tiles * 0.1 / 60));
        est.innerHTML = '<strong>Centro:</strong> ' + modalState.lat.toFixed(5) + ', ' + modalState.lng.toFixed(5) +
                        '<br><strong>Descarga estimada:</strong> ~' + tiles.toLocaleString('es-PE') + ' tiles · ~' + mb + ' MB · ~' + minEst + ' min';
        if (confirmBtn) confirmBtn.disabled = false;
      }

      modal.querySelectorAll('[data-method]').forEach(btn => {
        btn.addEventListener('click', () => setMethod(btn.getAttribute('data-method')));

      modal.querySelectorAll('[data-radius]').forEach(btn => {

          updateEstimate();
        });
      });
      modal.querySelectorAll('[data-zmax]').forEach(btn => {
        btn.addEventListener('click', () => {
          modal.querySelectorAll('[data-zmax]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          modalState.zMax = parseInt(btn.getAttribute('data-zmax'), 10);
          const lbl = modal.querySelector('#zone-add-zmax-label');

        });
      });
      modal.querySelector('#zone-add-cancel').addEventListener('click', () => {
        if (modalState.miniMap) modalState.miniMap.remove();
        modal.remove();
      });
      modal.querySelector('#zone-add-confirm').addEventListener('click', () => {
        if (modalState.lat == null || modalState.lng == null) return;
        const nameInput = modal.querySelector('#zone-add-name');
        const name = (nameInput && nameInput.value.trim()) || ('Zona ' + precisionZoneNextId);
        precisionZones.push({
          id: precisionZoneNextId++,
          name: name,
          lat: modalState.lat,
          lng: modalState.lng,
          radiusKm: modalState.radiusKm,
          zMax: modalState.zMax
        });
        if (modalState.miniMap) modalState.miniMap.remove();
        modal.remove();
        renderPrecisionZones();
        updateSummary();
      });

      setMethod('map');  // Default: tap en mapa
    }

    renderPrecisionZones();  // Render inicial vacío

  }

    );

    // Estado compartido con el modal y la descarga
    const MAX_PRECISION_ZONES = 5 - prevZones.length;  // límite descontando las previas
    const PRECISION_ZONE_ZMAX_OPTIONS = [15, 16, 17, 18];
    const PRECISION_ZONE_RADIUS_OPTIONS = [3, 5, 8, 12];
    let precisionZoneNextId = 1;
    // Consumir zona pre-cargada desde mapa sin tiles (GAP-I4)
    const _pending = state.pendingZoneFromMap;
    state.pendingZoneFromMap = null;
    const precisionZones = _pending
      ? [{ id: precisionZoneNextId++, name: _pending.name, lat: _pending.lat, lng: _pending.lng, radiusKm: _pending.radiusKm, zMax: _pending.zMax }]

    // Helpers locales
    function escapeHtmlSimple(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function estimatePrecisionZoneTilesSimple(radiusKm, zMax) {
      const centroLat = -9.0;
      const dLat = radiusKm / 111;
      const dLon = radiusKm / (111 * Math.cos(centroLat * Math.PI / 180));
      const bbox = { latMin: centroLat - dLat, latMax: centroLat + dLat,
                     lonMin: -75 - dLon, lonMax: -75 + dLon };

    function renderPrecisionZones() {
      const $list = $('#precision-zones-list');
      const $empty = $('#precision-zones-empty');
      const $addBtn = $('#precision-zone-add-btn');
      if (!$list) return;
      if (precisionZones.length === 0) {
        $list.innerHTML = '';
        if ($empty) $empty.style.display = 'block';
      } else {
        if ($empty) $empty.style.display = 'none';
        $list.innerHTML = precisionZones.map(z => {
          const tiles = estimatePrecisionZoneTilesSimple(z.radiusKm, z.zMax);
          const mb = (tiles * 20 / 1024).toFixed(1);
          return `<div class="precision-zone-item" data-id="${z.id}">
            <div class="precision-zone-item-info">
              <p class="precision-zone-item-name">${escapeHtmlSimple(z.name)}</p>
              <p class="precision-zone-item-meta">${z.lat.toFixed(4)}, ${z.lng.toFixed(4)} · radio ${z.radiusKm} km · z11–${z.zMax} · ~${tiles.toLocaleString('es-PE')} tiles · ~${mb} MB</p>
            </div>
            <button class="precision-zone-item-remove" data-remove="${z.id}" aria-label="Quitar predio">×</button>
          </div>`;
        }).join('');
        $list.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = parseInt(btn.getAttribute('data-remove'), 10);
            const idx = precisionZones.findIndex(z => z.id === id);
            if (idx >= 0) precisionZones.splice(idx, 1);
            renderPrecisionZones();
            updateSummary();
          });
        });
      }
      if ($addBtn) $addBtn.disabled = precisionZones.length >= MAX_PRECISION_ZONES;
    }

    function updateSummary() {
      const $summary = $('#zone-summary');
      const $estTiles = $('#zone-est-tiles');
      const $estMb = $('#zone-est-mb');
      const $breakdown = $('#zone-summary-breakdown');
      if (precisionZones.length === 0) {
        $summary.style.display = 'none';
        $download.disabled = true;
        return;
      }
      let totalTiles = 0;
      precisionZones.forEach(z => { totalTiles += estimatePrecisionZoneTilesSimple(z.radiusKm, z.zMax); });
      const provMultiplier = tileProviderChoice === 'both' ? 2 : 1;
      const totalTilesEff = totalTiles * provMultiplier;
      const totalMb = (totalTilesEff * 20 / 1024).toFixed(1);
      const minEst = Math.max(1, Math.round(totalTilesEff * 0.1 / 60));
      const provLabel = tileProviderChoice === 'sat' ? 'mapa satelital' : tileProviderChoice === 'osm' ? 'mapa callejero' : 'satelital + callejero';
      $estTiles.textContent = totalTilesEff.toLocaleString('es-PE');
      $estMb.textContent = '~' + totalMb;
      if ($breakdown) {
        const n = precisionZones.length;
        $breakdown.innerHTML = '<b>' + n + '</b> ' + (n===1?'predio nuevo':'predios nuevos') + ' · ' + provLabel + ' · ~' + minEst + ' min de descarga';
      }
      $summary.style.display = 'block';
      $download.disabled = false;
    }

    // Botón "+ Agregar predio" usa el mismo modal del Parche A
    const $pzAddBtn = $('#precision-zone-add-btn');
    if ($pzAddBtn) {
      $pzAddBtn.addEventListener('click', () => {
        openAddZoneModalSimple(precisionZones, precisionZoneNextId, MAX_PRECISION_ZONES, PRECISION_ZONE_RADIUS_OPTIONS, PRECISION_ZONE_ZMAX_OPTIONS, (newZone) => {
          precisionZones.push(Object.assign({}, newZone, { id: precisionZoneNextId++ }));
          renderPrecisionZones();
          updateSummary();
        });
      });
    }

    // Selector tipo de mapa (Satelital / Callejero / Ambos)
    document.querySelectorAll('.prov-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        tileProviderChoice = btn.dataset.prov;
        document.querySelectorAll('.prov-btn').forEach(function(b) {
          var active = b.dataset.prov === tileProviderChoice;
          b.style.borderColor = active ? 'var(--green)' : 'var(--lightgray)';
          b.style.background   = active ? 'var(--pale-green)' : 'white';
          b.style.color        = active ? 'var(--green-dark)' : 'var(--navy)';
          b.style.fontWeight   = active ? '600' : '400';
        });
        updateSummary();
      });
    });

    // Link "avanzado" al pie → flujo viejo de distritos
    const $advLink = $('#mapzone-advanced-link');
    if ($advLink) {
      $advLink.addEventListener('click', e => {
        e.preventDefault();
        state.view = 'mapzone:advanced';
        render();
      });
    }

    // Link "Limpiar todos los tiles descargados"
    const $clearTiles = $('#mapzone-clear-tiles');
    if ($clearTiles) {
      $clearTiles.addEventListener('click', async e => {
        e.preventDefault();
        const ok = await confirmDialog({
          title: 'Limpiar tiles descargados',
          message: 'Se borrarán <b>todos los tiles del mapa</b> guardados en este dispositivo. Tendrás que volver a descargar las zonas antes de salir a campo.',
          confirm: 'Sí, limpiar todo',
          cancel: 'Cancelar',
          danger: true
        });
        if (!ok) return;
        try {
          await clearTilesCache();
          await dbDelete('config', 'mapZone');
          state.cachedMapZone = null;
          state.hasBaseLayerCached = false;
          state.mapzoneReturnView = null;
          toast('Tiles eliminados. Descarga las zonas de nuevo antes de ir a campo.');
          setView('mapzone');
        } catch (err) {
          toast('Error al limpiar: ' + (err && err.message ? err.message : err));
        }
      });
    }

    // Handler de descarga
    $download.addEventListener('click', async () => {
      if (precisionZones.length === 0) return;
      // Soft nudge UX: si agregó solo 1 predio y no se mostró el aviso aún
      if (precisionZones.length === 1) {
        let nudgeShown = false;
        try { nudgeShown = !!localStorage.getItem('precisionMultipleZonesHint'); } catch(_){}
        if (!nudgeShown) {
          const cont = await confirmDialog({
            title: '¿Vas solo a un predio hoy?',
            message: 'Si visitarás varios predios hoy, puedes agregar hasta 5 zonas ahora con internet. En campo, sin conexión, ya no podrás definir nuevas zonas.',
            confirm: 'Sí, solo voy a 1',
            cancel: 'Agregar más predios'
          });
          try { localStorage.setItem('precisionMultipleZonesHint', '1'); } catch(_){}
          if (!cont) return;
        }
      }
      $download.disabled = true;
      state.isDownloadingTiles = true;
      await acquireWakeLock();
      showZoneProgressOverlay();
      try {
        const result = await runZoneDownload({
          region: null, provincia: null,
          distritos: [],
          precisionZones: precisionZones.slice(),
          append: additive,
          tileProvider: tileProviderChoice
        });
        hideZoneProgressOverlay();
        releaseWakeLock();
        state.isDownloadingTiles = false;
        showDownloadSuccessModal(result);
      } catch (err) {
        hideZoneProgressOverlay();
        releaseWakeLock();
        state.isDownloadingTiles = false;
        $download.disabled = false;
        console.error('[runZoneDownload] error:', err);
        toast('Error en la descarga · revisa tu conexión');
      }
    });

    renderPrecisionZones();

      document.body.appendChild(modal);
      const modalState = { method: 'map', lat: null, lng: null, radiusKm: 5, zMax: 18, miniMap: null, miniMarker: null };

      function setMethod(m) {
        modalState.method = m;
        modal.querySelectorAll('[data-method]').forEach(btn => {
          btn.classList.toggle('active', btn.getAttribute('data-method') === m);
        });
        const body = modal.querySelector('#zone-add-method-body');

            '<p style="font-size: 11px; color: var(--gray); margin: 4px 0 12px;">Toca el mapa para marcar el centro del predio. Mapa satelital activado.</p>';

      function initMiniMap() {
        const el = modal.querySelector('#zone-add-mini-map');

        tl.addTo(m);
        m.setView([-9.0, -75.0], 6);
        m.on('click', e => {
          modalState.lat = e.latlng.lat;
          modalState.lng = e.latlng.lng;
          if (modalState.miniMarker) m.removeLayer(modalState.miniMarker);
          modalState.miniMarker = L.marker(e.latlng).addTo(m);

      function updateFromCoords() {
        const lat = parseFloat(modal.querySelector('#zone-add-lat').value);
        const lng = parseFloat(modal.querySelector('#zone-add-lng').value);
        if (isFinite(lat) && isFinite(lng) && lat>=-90 && lat<=90 && lng>=-180 && lng<=180) {

      function updateEstimate() {
        const est = modal.querySelector('#zone-add-estimate');

        if (modalState.lat == null || modalState.lng == null) {

          return;

        const tiles = estimatePrecisionZoneTilesSimple(modalState.radiusKm, modalState.zMax);

        const minEst = Math.max(1, Math.round(tiles * 0.1 / 60));
        est.innerHTML = '<strong>Centro:</strong> ' + modalState.lat.toFixed(5) + ', ' + modalState.lng.toFixed(5) +
                        '<br><strong>Descarga estimada:</strong> ~' + tiles.toLocaleString('es-PE') + ' tiles · ~' + mb + ' MB · ~' + minEst + ' min';
        if (confirmBtn) confirmBtn.disabled = false;
      }
      modal.querySelectorAll('[data-method]').forEach(btn => {
        btn.addEventListener('click', () => setMethod(btn.getAttribute('data-method')));
      });
      modal.querySelectorAll('[data-radius]').forEach(btn => {
        btn.addEventListener('click', () => {
          modal.querySelectorAll('[data-radius]').forEach(b => b.classList.remove('active'));
