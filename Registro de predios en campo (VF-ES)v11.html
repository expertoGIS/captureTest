          modalState.radiusKm = parseFloat(btn.getAttribute('data-radius'));
          const lbl = modal.querySelector('#zone-add-radius-label');
          if (lbl) lbl.textContent = modalState.radiusKm + ' km';
          updateEstimate();
        });
      });
      modal.querySelectorAll('[data-zmax]').forEach(btn => {
        btn.addEventListener('click', () => {
          modal.querySelectorAll('[data-zmax]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          modalState.zMax = parseInt(btn.getAttribute('data-zmax'), 10);
          const lbl = modal.querySelector('#zone-add-zmax-label');
          if (lbl) lbl.textContent = 'z' + modalState.zMax;
          updateEstimate();
        });
      });
      modal.querySelector('#zone-add-cancel').addEventListener('click', () => {
        if (modalState.miniMap) modalState.miniMap.remove();
        modal.remove();
      });
      modal.querySelector('#zone-add-confirm').addEventListener('click', () => {
        if (modalState.lat == null || modalState.lng == null) return;
        const nameInput = modal.querySelector('#zone-add-name');
        const name = (nameInput && nameInput.value.trim()) || ('Predio ' + (zonesArr.length + prevZones.length + 1));
        const newZone = {
          name: name,
          lat: modalState.lat,
          lng: modalState.lng,
          radiusKm: modalState.radiusKm,
          zMax: modalState.zMax
        };
        if (modalState.miniMap) modalState.miniMap.remove();
        modal.remove();
        onConfirm(newZone);
      });
      setMethod('map');
    }
  }

  // Verifica si el GPS actual está dentro del bbox cacheado. No pide permiso si no está concedido.
  async function checkGpsInZoneAndAlert() {
    if (!state.cachedMapZone || !state.cachedMapZone.bbox) return;
    if (!navigator.permissions || !navigator.geolocation) return;
    try {
      const status = await navigator.permissions.query({ name: 'geolocation' });
      if (status.state !== 'granted') return; // No pedir prompt sin contexto
    } catch (_) { return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const bbox = state.cachedMapZone.bbox;
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        const margin = 0.05; // ~5.5 km de tolerancia
        const inside = (lat >= bbox.latMin - margin && lat <= bbox.latMax + margin &&
                        lon >= bbox.lonMin - margin && lon <= bbox.lonMax + margin);
        if (!inside) {
          const banner = document.getElementById('gps-out-banner');
          if (banner) banner.style.display = 'flex';
        }
      },
      _ => {},
      { enableHighAccuracy: false, timeout: 5000, maximumAge: 60000 }
    );
  }

  // ============================================================
  // OWNERSHIP ZONE · Agente A — MAP INIT (ofc_M3 · 20260506)
  // API expuesta: initMap, getTileLayer, setProvider, cacheTilesForBbox,
  //   clearTilesCache, fitBoundsToPoints, getCurrentLatLng,
  //   showMapBar, toggleMapBarCollapsed, viewMapTest.
  // Consume: state.map, state.mapProvider, state.mapZoom, store IDB 'tiles'.
  // ============================================================
  const MAP_PROVIDERS = {
    osm: {
      url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      attribution: '&copy; OpenStreetMap contributors',
      minZoom: 5,
      maxZoom: 19,
      maxNativeZoom: 19,          // OSM sirve tiles hasta z19 (política oficial)
      label: 'Callejero',
      icon: '🗺'
    },
    sat: {
      url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      attribution: 'Tiles &copy; Esri, Maxar, Earthstar Geographics',
      minZoom: 5,
      maxZoom: 19,                // corregido: estaba en 16; Esri sirve hasta z19+ según zona
      maxNativeZoom: 19,          // nivel máximo en que existen tiles reales del servidor
      label: 'Satelital',
      icon: '🛰'
    }
  };
  const OVERRIDE_ZOOM_CAP = 23;  // zoom máximo permitido en modo override (tiles stretched desde maxNativeZoom)

  // M3/T-08 · TileLayer subclase que cachea tiles en IDB store 'tiles'.
  // Comportamiento: cada tile se busca primero en IDB · si existe, se sirve desde blob;
  // si no, fetch HTTP + IDB.put + sirve. La key es '<provider>/<z>/<x>/<y>'.
  let TileLayerIDB = null;
  function ensureTileLayerIDBClass() {
    if (TileLayerIDB || !window.L) return;
    TileLayerIDB = L.TileLayer.extend({
      createTile: function(coords, done) {
        const tile = document.createElement('img');
        tile.setAttribute('role', 'presentation');
        tile.alt = '';
        const provider = this.options.providerName || state.mapProvider;
        const url = this.getTileUrl(coords);
        const key = provider + '/' + coords.z + '/' + coords.x + '/' + coords.y;

        dbGet('tiles', key).then(blob => {
          if (blob instanceof Blob) {
            tile.src = URL.createObjectURL(blob);
            tile.onload = () => { URL.revokeObjectURL(tile.src); done(null, tile); };
            return;
          }
          // Fetch + cache
          fetch(url, { mode: 'cors' }).then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.blob();
          }).then(b => {
            dbPutKeyed('tiles', b, key).catch(()=>{ /* cuota llena: silencioso */ });
            const u = URL.createObjectURL(b);
            tile.src = u;
            tile.onload = () => { URL.revokeObjectURL(u); done(null, tile); };
          }).catch(err => {
            // Sin red ni cache · marcar tile como error (Leaflet renderea grilla CSS por debajo)
            tile.classList.add('leaflet-tile-error');
            done(err, tile);
          });
        }).catch(err => done(err, tile));

        return tile;
      }
    });
  }

  function getTileLayer(name, overrides) {
    ensureTileLayerIDBClass();
    const p = MAP_PROVIDERS[name];
    if (!p) throw new Error('Provider desconocido: ' + name);
    // maxNativeZoom: hasta dónde existen tiles reales (caller puede pasar effectiveMaxZoom para offline)
    // maxZoom en el tile layer siempre = OVERRIDE_ZOOM_CAP para permitir zoom override
    var maxNativeZoom = (overrides && typeof overrides.maxNativeZoom === 'number')
      ? overrides.maxNativeZoom
      : (overrides && typeof overrides.maxZoom === 'number')
        ? overrides.maxZoom          // compat: maxZoom legacy → maxNativeZoom
        : (p.maxNativeZoom || p.maxZoom);
    const minZoom = (overrides && typeof overrides.minZoom === 'number') ? overrides.minZoom : (p.minZoom || 5);
    return new TileLayerIDB(p.url, {
      attribution: p.attribution,
      maxZoom: OVERRIDE_ZOOM_CAP,
      maxNativeZoom: maxNativeZoom,
      minZoom: minZoom,
      providerName: name
    });
  }

  // M3/T-07 · crea Leaflet container, monta tile layer default, fitBounds Perú+Colombia.
  // fix-zoomIniGeolocalizado F-01 · acepta opts.skipInitialView para que el caller decida la vista.
  function initMap(containerId, opts) {
    if (!window.L) {
      console.error('Leaflet no disponible · CDN no cargó');
      return null;
    }
    opts = opts || {};
    const initialProvider = opts.provider || state.mapProvider || 'osm';
    state.mapProvider = initialProvider;
    const map = L.map(containerId, {
      zoomControl: false,                                                       // usamos botones custom en barra hover izq
      attributionControl: true,
      maxZoom: OVERRIDE_ZOOM_CAP
    });
    
    // maxZoom efectivo según zonas de precisión cacheadas
    let effectiveMaxZoom = 16;
    const cz = state.cachedMapZone;
    if (cz && Array.isArray(cz.precisionZones) && cz.precisionZones.length) {
      const maxPz = Math.max.apply(null, cz.precisionZones.map(z => z.zMax || 16));
      effectiveMaxZoom = Math.max(16, maxPz);
    }
    // minZoom efectivo · si no hay capa base de Perú cacheada, limitar a z11 para
    // no mostrar pantalla negra cuando el usuario aleja el zoom fuera de sus zonas
    let effectiveMinZoom = 5;  // default · base panorámica cubre z5-10
    try {
      const s5 = latLngToTile(-9.0, -75.0, 5);
      const probeBaseTile = state.mapProvider + '/5/' + s5.x + '/' + s5.y;
      // dbGet es async pero acá necesitamos sincrono; usamos un flag previo
      effectiveMinZoom = (state.hasBaseLayerCached === false) ? 11 : 5;
    } catch (_) {}
    const layer = getTileLayer(initialProvider, { maxNativeZoom: effectiveMaxZoom, minZoom: effectiveMinZoom });

    layer.addTo(map);
    map._currentTileLayer = layer;
    if (!opts.skipInitialView) {
      // Default G-M2-4: fitBounds Perú+Colombia (vista panorámica · usado por mapTest)
      const b = CONFIG.PERU_COLOMBIA_BBOX;
      map.fitBounds([[b.latMin, b.lonMin], [b.latMax, b.lonMax]]);
    } else {
      // skipInitialView · setView neutral para que getCenter() no falle hasta que el caller lo override
      const b = CONFIG.PERU_COLOMBIA_BBOX;
      // Si hay zone cacheada, abrir centrado allí en zoom 12 (rango cacheado 11-16)
      // Si no hay zone, abrir panorámica de Perú en zoom 6 (rango cacheado 8-10 si pre-cargó base)
      const cz = state.cachedMapZone;
      if (cz && cz.bbox) {
        const cb = cz.bbox;
        map.setView([(cb.latMin + cb.latMax) / 2, (cb.lonMin + cb.lonMax) / 2], 12);
      } else {
        map.setView([(b.latMin + b.latMax) / 2, (b.lonMin + b.lonMax) / 2], 6);
      }
    }
    state.map = map;
    state.mapZoom = map.getZoom();
    map.on('zoomend', () => { state.mapZoom = map.getZoom(); });
    return map;
  }

  // fix-zoomIniGeolocalizado F-02 · zoomIniFromGeolocation(zoom, fallbackBbox, onReady)
  // Pide getCurrentPosition con timeout 8s · si responde: setView(latlng, zoom)
  // · si falla/niega/timeout: fitBounds(fallbackBbox) silencioso (G-FIX2-4=K).
  // fix-panelHoverYPinTraceCentro F-04 · onReady callback opcional · se ejecuta tras setView o fallback
  // (permite a callers como viewTraceMode posicionar pin en la coordenada final).
  function zoomIniFromGeolocation(zoomLevel, fallbackBbox, onReady) {
    if (!state.map) { if (onReady) onReady(); return; }
    const fallback = () => {
      if (state.map && fallbackBbox) {
        state.map.fitBounds([[fallbackBbox.latMin, fallbackBbox.lonMin], [fallbackBbox.latMax, fallbackBbox.lonMax]]);
      }
      if (onReady) onReady();
    };
    if (!navigator.geolocation) { fallback(); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        if (state.map) state.map.setView([pos.coords.latitude, pos.coords.longitude], Math.min(zoomLevel, 14));
        if (onReady) onReady();
      },
      () => fallback(),
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
    );
  }

  // M3/T-09 · swap entre providers sin recargar el mapa.
  function setProvider(name) {
    if (!state.map || !MAP_PROVIDERS[name]) return;
    const map = state.map;
    if (map._currentTileLayer) map.removeLayer(map._currentTileLayer);
    const layer = getTileLayer(name);
    layer.addTo(map);
    map._currentTileLayer = layer;
    state.mapProvider = name;
    // Si el zoom actual está en override territory, resetear al maxNativeZoom del nuevo provider
    const nativeMax = MAP_PROVIDERS[name].maxNativeZoom || 19;
    if (map.getZoom() > nativeMax) map.setZoom(nativeMax);
  }

  // Helpers: convierte (lat, lon, zoom) → (xtile, ytile)
  function latLngToTile(lat, lon, z) {
    const n = Math.pow(2, z);
    const x = Math.floor((lon + 180) / 360 * n);
    const latRad = lat * Math.PI / 180;
    const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
    return { x: x, y: y };
  }
  function countTilesInBbox(bbox, zMin, zMax) {
    let total = 0;
    for (let z = zMin; z <= zMax; z++) {
      const tl = latLngToTile(bbox.latMax, bbox.lonMin, z);
      const br = latLngToTile(bbox.latMin, bbox.lonMax, z);
      total += (Math.abs(br.x - tl.x) + 1) * (Math.abs(br.y - tl.y) + 1);
    }
    return total;
  }

  // M3/T-10 · pre-fetch deliberado de tiles del bbox visible.
  async function cacheTilesForBbox(bbox, zoomRange, providerOverride) {
    // No requerimos state.map · esta función trabaja directamente con bbox+provider, sin Leaflet
    const zMin = zoomRange.zMin, zMax = zoomRange.zMax;
    const provider = providerOverride || state.mapProvider;
    const urlTemplate = MAP_PROVIDERS[provider].url;
    const tileList = [];
    for (let z = zMin; z <= zMax; z++) {
      const tl = latLngToTile(bbox.latMax, bbox.lonMin, z);
      const br = latLngToTile(bbox.latMin, bbox.lonMax, z);
      for (let x = Math.min(tl.x, br.x); x <= Math.max(tl.x, br.x); x++) {
        for (let y = Math.min(tl.y, br.y); y <= Math.max(tl.y, br.y); y++) {
          tileList.push({ z: z, x: x, y: y });
        }
      }
    }
    const total = tileList.length;
    let done = 0, errors = 0;
    for (const t of tileList) {
      const key = provider + '/' + t.z + '/' + t.x + '/' + t.y;
      try {
        const existing = await dbGet('tiles', key);
        if (existing instanceof Blob) { done++; continue; }
        const url = urlTemplate.replace('{z}', t.z).replace('{x}', t.x).replace('{y}', t.y);
        const r = await fetch(url, { mode: 'cors' });
        if (!r.ok) { errors++; continue; }
        const b = await r.blob();
        await dbPutKeyed('tiles', b, key);
        done++;
      } catch (_) { errors++; }
      // Emit progress event
      window.dispatchEvent(new CustomEvent('recorder:tilesDownloadProgress', { detail: { done: done, total: total } }));
      // Pequeño delay para respetar política OSM ~1 req/s en lotes grandes
      if (provider === 'osm') await new Promise(r => setTimeout(r, 80));
    }
    return { done: done, total: total, errors: errors };
  }

  async function clearTilesCache() {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction('tiles', 'readwrite').objectStore('tiles').clear();
      tx.onsuccess = () => res(true);
      tx.onerror = () => rej(tx.error);
    });
  }

  function fitBoundsToPoints(points) {
    if (!state.map || !points || !points.length) return;
    const bnds = points.map(p => [p[1], p[0]]);                                 // [lat, lon]
    state.map.fitBounds(bnds, { padding: [40, 40] });
  }
  function getCurrentLatLng() {
    if (!state.map) return null;
    const c = state.map.getCenter();
    return [c.lat, c.lng];
  }

  function showZonesMenu(zones) {
    if (!state.map || !zones || zones.length === 0) return;
    // Detectar zona "actual" según el centro visible del mapa
    const c = state.map.getCenter();
    let currentIdx = -1;
    let bestDist = Infinity;
    zones.forEach((z, i) => {
      const dLat = (c.lat - z.lat);
      const dLng = (c.lng - z.lng);
      const dist = dLat*dLat + dLng*dLng;
      if (dist < bestDist) { bestDist = dist; currentIdx = i; }
    });
    const overlay = document.createElement('div');
    overlay.className = 'zones-menu-overlay';
    overlay.innerHTML = `
      <div class="zones-menu-content">
        <h4>Saltar a otra zona descargada</h4>
        ${zones.map((z, i) => `
          <div class="zones-menu-item ${i===currentIdx?'current':''}" data-idx="${i}">
            <div class="zones-menu-item-info">
              <p class="zones-menu-item-name">${String(z.name || 'Predio ' + (i+1)).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}${i===currentIdx?' <span style="font-size:10px;color:var(--green-dark);font-weight:400">· acá estás</span>':''}</p>
              <p class="zones-menu-item-meta">${z.lat.toFixed(4)}, ${z.lng.toFixed(4)} · radio ${z.radiusKm} km · z11–${z.zMax}</p>
            </div>
          </div>
        `).join('')}
        <button class="zones-menu-close" id="zones-menu-close-btn">Cerrar</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelectorAll('.zones-menu-item').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.getAttribute('data-idx'), 10);
        const z = zones[idx];
        if (z && state.map) {
          // Centrar en la zona con un zoom razonable
          const targetZoom = Math.min(14, z.zMax || 14);
          state.map.setView([z.lat, z.lng], targetZoom);
        }
        overlay.remove();
      });
    });
    overlay.querySelector('#zones-menu-close-btn').addEventListener('click', () => overlay.remove());
    // Tap fuera del menú lo cierra también
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  function toggleMapBarCollapsed() {
    const bar = $('#r-mapBar');

      if (toggleBtn) toggleBtn.classList.remove('pulse-attention');

  async function handleDownloadTilesClick() {
    if (!state.map) return;
    const bnds = state.map.getBounds();
    const bbox = {
      latMin: bnds.getSouth(), latMax: bnds.getNorth(),
      lonMin: bnds.getWest(),  lonMax: bnds.getEast()
    };
    const zCurrent = state.map.getZoom();
    const provider = MAP_PROVIDERS[state.mapProvider];
    const zMin = Math.max(zCurrent - 2, provider.minZoom || 1);
    const zMax = Math.min(zCurrent + 2, provider.maxZoom);
    // Buffer 25% en cada lado para evitar el bug de "cuadrante corto"
    const dLat = (bbox.latMax - bbox.latMin) * 0.25;
    const dLon = (bbox.lonMax - bbox.lonMin) * 0.25;
    bbox.latMin -= dLat; bbox.latMax += dLat;
    bbox.lonMin -= dLon; bbox.lonMax += dLon;
    const totalTiles = countTilesInBbox(bbox, zMin, zMax);
    const estMB = (totalTiles * 20 / 1024).toFixed(1);                          // ~20 KB/tile promedio
    const ok = await confirmDialog({
      title: '¿Descargar tiles del mapa?',
      message: `Se descargarán <b>~${totalTiles}</b> tiles (zoom ${zMin}–${zMax}, provider <b>${MAP_PROVIDERS[state.mapProvider].label}</b>) · estimado <b>~${estMB} MB</b>. La descarga puede tardar varios minutos.`,
      confirm: 'Descargar',
      cancel: 'Cancelar'
    });
    if (!ok) return;
    toast('Descargando ' + totalTiles + ' tiles · puede tardar…');
    const result = await cacheTilesForBbox(bbox, { zMin: zMin, zMax: zMax });
    toast('Listo · ' + result.done + ' tiles guardados' + (result.errors ? ' · ' + result.errors + ' errores' : ''));
  }

  // ============================================================
  // OWNERSHIP ZONE · Agente B — WALK MODE (ofc_M4 · 20260506)
  // Render zonas de trabajo descargadas como rectángulos semitransparentes sobre un mapa Leaflet.
  function addZoneRectangles(map) {
    if (!map || !state.cachedMapZone || !Array.isArray(state.cachedMapZone.precisionZones)) return;
    state.cachedMapZone.precisionZones.forEach(z => {
      if (!z.bbox) return;
      L.rectangle(

        { interactive: false, color: '#4A90D9', weight: 1.2, fillOpacity: 0.07, dashArray: '5 5' }
      ).addTo(map);
    });
  }

    if (state.draft && state.draft.latitud != null && state.draft.longitud != null) {

    // F4+F5 (G-M4-1=A umbral 0.3 m/s · G-M4-2=A divIcon SVG)
    function buildLiveDivIcon(fix) {
      const speed = fix && fix.speed;
      const heading = fix && fix.heading;
      const isMoving = speed != null && isFinite(speed) && speed > 0.3;
      const ql = accuracyToLevel(fix && fix.accuracy);
      const color = ql.cls === 'good' ? '#4DADCE' : (ql.cls === 'warn' ? '#F1AD0A' : '#D14B4B');
      let svgInner;
      if (isMoving) {
        const rot = heading != null && isFinite(heading) ? heading : 0;
        svgInner = `<svg viewBox="-12 -12 24 24" width="28" height="28" style="transform: rotate(${rot}deg);">
          <polygon points="0,-10 7,8 0,4 -7,8" fill="${color}" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>`;
      } else {
        svgInner = `<svg viewBox="-12 -12 24 24" width="28" height="28">
          <circle cx="0" cy="0" r="6" fill="${color}" stroke="white" stroke-width="1.5">
            <animate attributeName="r" values="5;9;5" dur="1.4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.45;1" dur="1.4s" repeatCount="indefinite"/>
          </circle>
        </svg>`;
      }
      return L.divIcon({ html: svgInner, className: 'recorder-live-icon', iconSize: [28, 28], iconAnchor: [14, 14] });
    }
    function updateLiveMarker(fix) {
      if (!fix) {
        if (liveMarker) { state.map.removeLayer(liveMarker); liveMarker = null; }
        return;
      }
      const latlng = [fix.lat, fix.lon];
      const icon = buildLiveDivIcon(fix);
      if (liveMarker) { liveMarker.setLatLng(latlng); liveMarker.setIcon(icon); }
      else liveMarker = L.marker(latlng, { icon: icon, interactive: false, keyboard: false }).addTo(state.map);
    }

    // T-14 · drawPoly Leaflet sustituye SVG del M1
    function drawPolyLeaflet() {
      polyLayer.clearLayers();
      const pts = state.draft.poligono || [];
      const liveFix = state.polygonRecording && state.polygonRecording.liveFix;
      const warnEl = $('#r-warning');
      if (warnEl) { warnEl.classList.remove('show'); warnEl.textContent = ''; }

      pts.forEach(p => {
        const acc = p.length >= 3 ? p[2] : null;
        if (acc != null && acc > 0) {
          L.circle([p[1], p[0]], { radius: acc, color: '#93BD41', fillColor: '#93BD41', fillOpacity: 0.12, stroke: false }).addTo(polyLayer);
        }
      });

      const latlngs = pts.map(p => [p[1], p[0]]);
      if (pts.length >= 3) {
        L.polygon(latlngs, { color: '#93BD41', weight: 1.5, fillOpacity: 0.18, lineJoin: 'round' }).addTo(polyLayer);
      } else if (pts.length >= 2) {
        L.polyline(latlngs, { color: '#93BD41', weight: 1.5 }).addTo(polyLayer);
      }

      let firstPulse = false;
      if (liveFix && pts.length >= 3) {
        const dM = haversineMeters([liveFix.lon, liveFix.lat], [pts[0][0], pts[0][1]]);
        if (dM < 15) firstPulse = true;
      }

      pts.forEach((p, i) => {
        const isLast = i === pts.length - 1;
        const isFirst = i === 0;
        const acc = p.length >= 3 ? p[2] : null;
        const sospechoso = (acc != null && acc > 50);
        const r = isLast ? 7 : (isFirst && firstPulse ? 9 : 5);
        const fill = isLast ? '#F1AD0A' : (sospechoso ? '#F1AD0A' : '#93BD41');
        const stroke = sospechoso ? '#B07500' : 'white';
        const cm = L.circleMarker([p[1], p[0]], {
          radius: r, fillColor: fill, color: stroke, weight: 2, fillOpacity: 1,
          dashArray: sospechoso ? '3,3' : null
        });
        cm.addTo(polyLayer);
        if (isFirst && firstPulse && cm._path) cm._path.classList.add('recorder-first-pulse');
      });

      if (liveFix) updateLiveMarker(liveFix);

      if (warnEl && pts.length >= 4) {
        const flat = pts.map(p => [p[0], p[1]]);
        if (polygonHasSelfIntersection(flat)) {
          warnEl.textContent = '⚠ El polígono tiene aristas que se cruzan — revisa puntos sospechosos (borde naranja punteado)';
          warnEl.classList.add('show');
        }
      }
    }

    function updateRecorderMetrics() {
      const pts = state.draft.poligono || [];
      $('#r-pts').textContent = pts.length;
      $('#r-area').textContent = pts.length >= 3 ? polygonAreaHa(pts).toFixed(2) : '0';
      $('#r-perim').textContent = pts.length >= 2 ? Math.round(polygonPerimeterMeters(pts)) : '0';
      const done = $('#r-done'); if (done) done.disabled = pts.length < 3;
      const undo = $('#r-undo'); if (undo) undo.disabled = pts.length === 0;
    }

    function applyLiveFix(fix) {
      state.polygonRecording.liveFix = fix;
      // fix-zoomIniGeolocalizado F-03 · centra mapa en primer fix válido (zoom 17 G-FIX2-3=I)
      if (!firstFixCentered && fix && fix.lat != null && fix.lon != null && state.map) {
        state.map.setView([fix.lat, fix.lon], 14);
        firstFixCentered = true;
      }
      const ql = accuracyToLevel(fix && fix.accuracy);
      const qEl = $('#r-quality'); const qVal = $('#r-quality-val');
      if (qEl && qVal) {
        qEl.classList.remove('good','warn','bad'); qEl.classList.add(ql.cls);
        qVal.textContent = ql.label + (fix && fix.accuracy != null ? ' · ±' + formatAccuracy(fix.accuracy) : '');
      }
      const hVal = $('#r-heading-val');
      if (hVal) hVal.textContent = formatHeading(fix && fix.heading);
      const sEl = $('#r-speed'); const sVal = $('#r-speed-val');
      if (sEl && sVal) {
        const cls = speedClass(fix && fix.speed);
        sEl.classList.remove('good','warn','bad'); sEl.classList.add(cls);
        sVal.textContent = formatSpeed(fix && fix.speed);
      }
      // T-18 dist+rumbo último
      const pts = state.draft.poligono || [];
      const dlVal = $('#r-distLast-val'); const blVal = $('#r-bearLast-val');
      if (fix && pts.length > 0) {
        const last = pts[pts.length - 1];
        const dM = haversineMeters([fix.lon, fix.lat], [last[0], last[1]]);
        const bD = bearingDegrees([last[0], last[1]], [fix.lon, fix.lat]);
        if (dlVal) dlVal.textContent = formatAccuracy(dM);
        if (blVal) blVal.textContent = formatHeading(bD);
      } else {
        if (dlVal) dlVal.textContent = '—';
        if (blVal) blVal.textContent = '—';
      }
      drawPolyLeaflet();
    }

    if (navigator.geolocation && state.polygonRecording.watchId == null) {
      try {
        state.polygonRecording.watchId = navigator.geolocation.watchPosition(
          pos => applyLiveFix({
            lat: pos.coords.latitude, lon: pos.coords.longitude,
            accuracy: pos.coords.accuracy, heading: pos.coords.heading,
            speed: pos.coords.speed, timestamp: pos.timestamp
          }),
          () => applyLiveFix(null),
          { enableHighAccuracy: true, maximumAge: 1000, timeout: 20000 }
        );
      } catch (_) {}
    }

    function stopWatch() {
      const w = state.polygonRecording && state.polygonRecording.watchId;
      if (w != null && navigator.geolocation && navigator.geolocation.clearWatch) navigator.geolocation.clearWatch(w);
      state.polygonRecording = { liveFix: null, watchId: null };
    }
    function teardownMap() {
      if (state.map) { state.map.remove(); state.map = null; }
    }

    // RF-03 · burger toggle visibility de la sub-sección panel dentro del overlay
    $('#r-burger').addEventListener('click', () => {
      $('#r-overlay').classList.toggle('panel-open');
      $('#r-burger').classList.toggle('open');
    });

    // RF-04 · botón info del panel · expande labels en overlay 15s
    let panelInfoTimer = null;
    $('#r-panel-info').addEventListener('click', () => {
      const overlay = $('#r-overlay');
      const wasExpanded = overlay.classList.contains('info-expanded');
      if (panelInfoTimer) { clearTimeout(panelInfoTimer); panelInfoTimer = null; }
      if (wasExpanded) {
        overlay.classList.remove('info-expanded');
      } else {
        overlay.classList.add('info-expanded');
        panelInfoTimer = setTimeout(() => overlay.classList.remove('info-expanded'), 15000);
      }
    });

    $('#r-cancel').addEventListener('click', async () => {
      const pts = state.draft && state.draft.poligono;
      if (pts && pts.length > 0) {
        const ok = await confirmDialog({
          title: '¿Descartar polígono?',
          message: `Vas a perder los <b>${pts.length}</b> puntos capturados. Esta acción no se puede deshacer.`,
          confirm: 'Descartar', cancel: 'Seguir capturando', danger: true
        });
        if (!ok) return;
      }
      stopWatch(); teardownMap();
      /* ofc_M8 · descarta polígono pero PRESERVA state.draft (resto del predio del Step 1) · vuelve a Step 2 */
      if (state.draft) state.draft.poligono = [];
      state.mode = null;
      $view().className = 'view';
      setView('step2');
    });

    function pushPointFromCoords(lat, lon, acc) {
      if (!isInsidePeru(lat, lon)) { toast('Punto fuera de Perú'); return false; }
      state.draft.poligono.push([+lon.toFixed(6), +lat.toFixed(6), acc != null ? +acc.toFixed(1) : null]);
      updateRecorderMetrics(); drawPolyLeaflet();
      const n = state.draft.poligono.length;
      toast(`Punto ${n} guardado` + (acc != null ? ` (±${formatAccuracy(acc)})` : ''));
      return true;
    }
    async function tryAddPoint() {
      const fix = state.polygonRecording.liveFix;
      const fresh = fix && fix.timestamp && (Date.now() - fix.timestamp) < 5000;
      const acc = fresh ? fix.accuracy : null;
      if (acc != null && acc > 50) {
        const ok = await confirmDialog({
          title: 'Calidad de señal pobre',
          message: `La precisión actual es <b>±${formatAccuracy(acc)}</b>. Capturar este punto puede introducir ruido en el polígono. ¿Capturar igual?`,
          confirm: 'Capturar igual', cancel: 'Esperar mejor señal'
        });
        if (!ok) return;
      }
      if (fresh) { pushPointFromCoords(fix.lat, fix.lon, fix.accuracy); return; }
      if (!navigator.geolocation) { toast('GPS no disponible'); return; }
      const btn = $('#r-add'); btn.disabled = true;
      navigator.geolocation.getCurrentPosition(pos => {
        btn.disabled = false;
        pushPointFromCoords(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
      }, () => { btn.disabled = false; toast('No pudimos ubicarte'); },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
    }
    $('#r-add').addEventListener('click', tryAddPoint);

    $('#r-undo').addEventListener('click', () => {
      const pts = state.draft.poligono;
      if (!pts || pts.length === 0) return;
      pts.pop(); updateRecorderMetrics(); drawPolyLeaflet();
      toast('Último punto quitado');
    });

    $('#r-done').addEventListener('click', () => {
      /* ofc_M8 · polígono pertenece al draft del predio · NO se persiste como record independiente · vuelve a Step 2 que lo verá */
      const pts = state.draft.poligono;
      if (!pts || pts.length < 3) return;
      stopWatch();
      state.draft.mode = 'walk';                                                /* persiste el modo en el draft del predio */
      state.mode = null;
      teardownMap();
      toast(`Polígono guardado · ${pts.length} pts`);
      $view().className = 'view';
      setView('step2');
    });

    drawPolyLeaflet();
    updateRecorderMetrics();
  }

  // ============================================================
  // OWNERSHIP ZONE · Agente C — TRACE MODE (ofc_M5 · 20260506)
  // viewTraceMode() · nuevo · L.Marker draggable centrado + Fijar/Deshacer/Cerrar/Atrás
  // + chip dist+rumbo top-right (G-M5-2=B) + snap visual al primer pt (G-M5-4=A).
  // ============================================================
  function buildTracePinIcon() {
    return L.divIcon({
      html: `<svg viewBox="-14 -22 28 28" width="28" height="28" style="opacity:0.7">
               <path d="M0,-20 C8,-20 12,-14 12,-8 C12,-2 6,4 0,6 C-6,4 -12,-2 -12,-8 C-12,-14 -8,-20 0,-20 Z"
                     fill="#4DADCE" stroke="white" stroke-width="2" stroke-linejoin="round"/>
               <circle cx="0" cy="-10" r="3.5" fill="white"/>
             </svg>`,
      className: 'recorder-tracePin-icon',
      iconSize: [28, 28],
      iconAnchor: [14, 24]                                                      // punta del pin en latlng
    });
  }
  function buildFixedMarkerIcon(opts) {
    opts = opts || {};
    const r = opts.first ? 9 : 7;
    const fill = '#93BD41';
    const pulseClass = opts.firstPulse ? ' recorder-first-pulse' : '';
    return L.divIcon({
      html: `<svg viewBox="-12 -12 24 24" width="${r*2+4}" height="${r*2+4}" class="recorder-tracePin-marker${pulseClass}">
               <circle cx="0" cy="0" r="${r}" fill="${fill}" stroke="white" stroke-width="2"/>
             </svg>`,
      className: 'recorder-tracePin-marker',
      iconSize: [r*2+4, r*2+4],
      iconAnchor: [r+2, r+2]
    });
  }

  function viewTraceMode() {
    /* ofc_M8 · NO pisa state.draft (poblado por Step 1) · solo agrega campos del modo */
    if (!state.draft) state.draft = {};
    if (!state.draft.poligono) state.draft.poligono = [];
    state.draft.mode = 'trace';
    state.mode = 'trace';

    $view().className = 'view no-pad';
    $view().innerHTML = `
      <div class="poly-shell">
        <div class="map-container" id="map-trace"></div>
        ${state.noTilesWarning ? `<div class="no-tiles-banner"><span class="no-tiles-warn-a">Sin tiles — mapa solo en línea</span><span class="no-tiles-warn-b">↑ Lupa → gestor de zonas de trabajo</span></div>` : ''}
        <div class="recorder-overlay" id="t-overlay">
          <div class="recorder-stats-line good" id="t-distLast"><span class="lbl">Dist últ:</span><span id="t-distLast-val">—</span></div>
          <div class="recorder-stats-line good" id="t-bearLast"><span class="lbl">Rumbo últ:</span><span id="t-bearLast-val">—</span></div>
          <div class="recorder-stats-line good" id="t-zoom"><span class="lbl">Zoom:</span><span id="t-zoom-val">—</span></div>
          <div class="recorder-stats-line warn hidden" id="t-snapHint"><span>Soltar para cerrar</span></div>
          <button class="recorder-hamburger" id="t-burger" aria-label="Abrir panel"><span></span><span></span><span></span></button>
          <div class="recorder-panel-section" id="t-panel">
            <button class="recorder-panel-info" id="t-panel-info" aria-label="Mostrar/ocultar texto">i</button>
            <div class="recorder-panel-metrics" id="t-metrics">
              <b id="t-pts">0</b> pts<br>
              <b id="t-area">0</b> ha<br>
              <b id="t-perim">0</b> m
            </div>
            <div class="recorder-panel-divider"></div>
            <button class="recorder-panel-btn quitar" id="t-undo"><span class="r-panel-icon">↶</span><span class="r-panel-label">Deshacer último</span></button>
            <button class="recorder-panel-btn cerrar" id="t-done"><span class="r-panel-icon">✓</span><span class="r-panel-label">Cerrar</span></button>
            <button class="recorder-panel-btn add"    id="t-fix"><span class="r-panel-icon"><svg viewBox="-14 -22 28 28" width="16" height="16"><path d="M0,-20 C8,-20 12,-14 12,-8 C12,-2 6,4 0,6 C-6,4 -12,-2 -12,-8 C-12,-14 -8,-20 0,-20 Z" fill="#4DADCE" stroke="white" stroke-width="2.5" stroke-linejoin="round"/><circle cx="0" cy="-10" r="3.5" fill="white"/></svg></span><span class="r-panel-label">Fijar</span></button>
            <button class="recorder-panel-btn atras"  id="t-cancel"><span class="r-panel-icon">✕</span><span class="r-panel-label">Atrás</span></button>
          </div>
        </div>
      </div>
    `;
    clearActionBar();

    initMap('map-trace', { skipInitialView: true });                            // fix-zoomIniGeolocalizado F-04
    addZoneRectangles(state.map);
    const shell = $view().querySelector('.poly-shell');
    const mapBar = showMapBar(shell);

    // Overlay de parcelas con ojo activo
    const refLayer = L.layerGroup().addTo(state.map);
    const snapVertices = [];
    let snapEnabled = false;
    (() => {
      const activeUuids = Object.keys(state.visibleParcelas).filter(uuid => state.visibleParcelas[uuid]);
      activeUuids.forEach(uuid => {
        const p = state.predios.find(x => x.predio_uuid === uuid);
        if (!p) return;
        if (p.poligono && p.poligono.length >= 3) {
          const latlngs = p.poligono.map(pt => [pt[1], pt[0]]);
          L.polygon(latlngs, { interactive: false, color: '#E07B39', weight: 1.5, fillOpacity: 0.12, dashArray: '4 3' }).addTo(refLayer);
          p.poligono.forEach(pt => snapVertices.push({ lat: pt[1], lng: pt[0] }));
        } else if (p.latitud != null && p.longitud != null) {
          L.circleMarker([p.latitud, p.longitud], { interactive: false, radius: 5, color: '#E07B39', fillOpacity: 0.7 }).addTo(refLayer);
        }
      });
      if (snapVertices.length > 0) snapEnabled = true;
    })();

    const polyLayer = L.layerGroup().addTo(state.map);
    let pinMarker = null;                                                       // L.Marker draggable (G-M5-1=A)
    const fixedMarkers = [];                                                    // referencias para deshacer

    // Botón imán: solo en trace, solo cuando hay vértices de referencia
    if (snapVertices.length > 0) {
      const mbControls = mapBar && mapBar.querySelector('#mb-controls');
      if (mbControls) {
        const snapBtn = document.createElement('button');
        snapBtn.className = 'recorder-mapBar-btn';
        snapBtn.id = 'mb-snap';
        snapBtn.setAttribute('aria-label', 'Toggle snap a vértices de parcelas');
        snapBtn.style.cssText = 'opacity:1;';
        snapBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 3v9a6 6 0 0 0 12 0V3"/><line x1="3" y1="6" x2="6" y2="6"/><line x1="18" y1="6" x2="21" y2="6"/></svg>`;
        mbControls.appendChild(snapBtn);
        snapBtn.addEventListener('click', () => {
          snapEnabled = !snapEnabled;
          snapBtn.style.opacity = snapEnabled ? '1' : '0.35';
        });
      }
    }

    function spawnPin() {
      const center = state.map.getCenter();
      pinMarker = L.marker(center, {
        icon: buildTracePinIcon(),
        draggable: true,
        autoPan: true,
        keyboard: false
      }).addTo(state.map);
      state.tracePin = { lat: center.lat, lon: center.lng, dragging: false };
      pinMarker.on('dragstart', () => { state.tracePin.dragging = true; });
      pinMarker.on('drag', () => {
        const ll = pinMarker.getLatLng();
        state.tracePin.lat = ll.lat; state.tracePin.lon = ll.lng;
        updatePinFeedback();
      });
      pinMarker.on('dragend', () => {
        state.tracePin.dragging = false;
        if (snapEnabled && snapVertices.length > 0 && state.map) {
          const pinPt = state.map.latLngToContainerPoint(pinMarker.getLatLng());
          let best = null, bestDist = 28;
          for (let si = 0; si < snapVertices.length; si++) {
            const vPt = state.map.latLngToContainerPoint(L.latLng(snapVertices[si].lat, snapVertices[si].lng));
            const d = Math.sqrt(Math.pow(pinPt.x - vPt.x, 2) + Math.pow(pinPt.y - vPt.y, 2));
            if (d < bestDist) { bestDist = d; best = snapVertices[si]; }
          }
          if (best) {
            pinMarker.setLatLng(L.latLng(best.lat, best.lng));
            state.tracePin.lat = best.lat;
            state.tracePin.lon = best.lng;
          }
        }
        updatePinFeedback();
      });
      updatePinFeedback();
    }

    function updatePinFeedback() {
      const pts = state.draft.poligono || [];
      const dlVal = $('#t-distLast-val'); const blVal = $('#t-bearLast-val');
      const snapHint = $('#t-snapHint');
      let nearFirst = false;
      if (state.tracePin && pts.length > 0) {
        const last = pts[pts.length - 1];
        const first = pts[0];
        const dM = haversineMeters([state.tracePin.lon, state.tracePin.lat], [last[0], last[1]]);
        const bD = bearingDegrees([last[0], last[1]], [state.tracePin.lon, state.tracePin.lat]);
        if (dlVal) dlVal.textContent = formatAccuracy(dM);
        if (blVal) blVal.textContent = formatHeading(bD);
        if (pts.length >= 3) {
          const dF = haversineMeters([state.tracePin.lon, state.tracePin.lat], [first[0], first[1]]);
          if (dF < 15) nearFirst = true;                                        // G-M5-4=A snap visual al primer punto
        }
      } else {
        if (dlVal) dlVal.textContent = pts.length === 0 ? 'Primer pto' : '—';
        if (blVal) blVal.textContent = '—';
      }
      if (snapHint) snapHint.classList.toggle('hidden', !nearFirst);
      // Refresca primer marker para activar/desactivar pulse
      redrawFixed(nearFirst);
    }

    function redrawFixed(firstPulse) {
      polyLayer.clearLayers();
      const pts = state.draft.poligono || [];
      const latlngs = pts.map(p => [p[1], p[0]]);
      if (pts.length >= 3) {
        L.polygon(latlngs, { color: '#93BD41', weight: 1.5, fillOpacity: 0.18, lineJoin: 'round' }).addTo(polyLayer);
      } else if (pts.length >= 2) {
        L.polyline(latlngs, { color: '#93BD41', weight: 1.5 }).addTo(polyLayer);
      }
      pts.forEach((p, i) => {
        const isFirst = i === 0;
        const m = L.marker([p[1], p[0]], {
          icon: buildFixedMarkerIcon({ first: isFirst, firstPulse: isFirst && !!firstPulse }),
          interactive: false,
          keyboard: false
        });
        m.addTo(polyLayer);
      });
      // Refresca zoom KPI
      const zVal = $('#t-zoom-val'); if (zVal && state.map) zVal.textContent = state.map.getZoom();
    }

    state.map.on('zoomend', () => { const z = $('#t-zoom-val'); if (z && state.map) z.textContent = state.map.getZoom(); });

    function updateRecorderMetrics() {
      const pts = state.draft.poligono || [];
      $('#t-pts').textContent = pts.length;
      $('#t-area').textContent = pts.length >= 3 ? polygonAreaHa(pts).toFixed(2) : '0';
      $('#t-perim').textContent = pts.length >= 2 ? Math.round(polygonPerimeterMeters(pts)) : '0';
      const done = $('#t-done'); if (done) done.disabled = pts.length < 3;
      const undo = $('#t-undo'); if (undo) undo.disabled = pts.length === 0;
    }

    function teardownMap() {
      if (state.map) { state.map.remove(); state.map = null; }
      pinMarker = null; state.tracePin = null;
      refLayer.clearLayers();
    }

    // RF-03 trace · burger toggle visibility de la sub-sección panel dentro del overlay
    $('#t-burger').addEventListener('click', () => {
      $('#t-overlay').classList.toggle('panel-open');
      $('#t-burger').classList.toggle('open');
    });

    // RF-04 trace · botón info del panel · expande labels en overlay 15s
    let panelInfoTimerT = null;
    $('#t-panel-info').addEventListener('click', () => {
      const overlay = $('#t-overlay');
      const wasExpanded = overlay.classList.contains('info-expanded');
      if (panelInfoTimerT) { clearTimeout(panelInfoTimerT); panelInfoTimerT = null; }
      if (wasExpanded) {
        overlay.classList.remove('info-expanded');
      } else {
        overlay.classList.add('info-expanded');
        panelInfoTimerT = setTimeout(() => overlay.classList.remove('info-expanded'), 15000);
      }
    });

    // T-22 · Fijar · isInsidePeru guard (T-26) · spawnea nuevo pin
    $('#t-fix').addEventListener('click', () => {
      if (!state.tracePin) return;
      const lat = state.tracePin.lat, lon = state.tracePin.lon;
      if (!isInsidePeru(lat, lon)) { toast('Punto fuera de Perú'); return; }
      state.draft.poligono.push([+lon.toFixed(6), +lat.toFixed(6), null]);
      state.map.removeLayer(pinMarker); pinMarker = null;
      updateRecorderMetrics();
      redrawFixed(false);
      toast(`Punto ${state.draft.poligono.length} fijado`);
      spawnPin();                                                                // nuevo pin centrado
    });

    // T-23 · Deshacer último
    $('#t-undo').addEventListener('click', () => {
      const pts = state.draft.poligono;
      if (!pts || pts.length === 0) return;
      pts.pop();
      updateRecorderMetrics();
      redrawFixed(false);
      toast('Último punto deshecho');
    });

    // ofc_M8 · Atrás · descarta polígono pero PRESERVA state.draft (resto del predio del Step 1) · vuelve a Step 2
    $('#t-cancel').addEventListener('click', async () => {
      const pts = state.draft && state.draft.poligono;
      if (pts && pts.length > 0) {
        const ok = await confirmDialog({
          title: '¿Descartar polígono?',
          message: `Vas a perder los <b>${pts.length}</b> puntos fijados. Esta acción no se puede deshacer.`,
          confirm: 'Descartar', cancel: 'Seguir trazando', danger: true
        });
        if (!ok) return;
      }
      teardownMap();
      if (state.draft) state.draft.poligono = [];
      state.mode = null;
      $view().className = 'view';
      setView('step2');
    });

    // ofc_M8 · Cerrar · polígono pertenece al draft del predio · NO se persiste como record · vuelve a Step 2
    $('#t-done').addEventListener('click', () => {
      const pts = state.draft.poligono;
      if (!pts || pts.length < 3) return;
      state.draft.mode = 'trace';                                                /* persiste el modo en el draft del predio */
      state.mode = null;
      teardownMap();
      toast(`Polígono guardado · ${pts.length} pts`);
      $view().className = 'view';
      setView('step2');
    });

    /* ofc_M8 G-M8-6=Q · GPS híbrido: usa fix cacheado del Step 2 (≤5 min) si existe, sino getCurrentPosition vía zoomIniFromGeolocation */
    const gpsAge = state.draft && state.draft.gps_capturado_at
      ? Date.now() - state.draft.gps_capturado_at
      : Infinity;
    const cacheValid = state.draft && state.draft.latitud != null && state.draft.longitud != null && gpsAge < 300000;
    if (cacheValid) {
      state.map.setView([state.draft.latitud, state.draft.longitud], 14);
      spawnPin();
      updateRecorderMetrics();
      redrawFixed(false);
    } else {
      const fallbackBbox = CONFIG.BBOX_MODE === 'peruColombia' ? CONFIG.PERU_COLOMBIA_BBOX : CONFIG.PERU_BBOX;
      zoomIniFromGeolocation(17, fallbackBbox, () => {
        spawnPin();
        updateRecorderMetrics();
        redrawFixed(false);
      });
    }
  }

  // ============================================================
  // OWNERSHIP ZONE · Agente D — MODE SELECTOR (ofc_M6 · 20260506)
  // showModeSelector(callback) · modal overlay con 2 botones modo + info expandible 15s.
  // toggleMapBarCollapsed() vive en zone A (Agente A · MAP INIT).
  // ============================================================
  function showModeSelector(callback) {
    const html = `
      <div class="dialog-backdrop" id="dialog-bd-mode">
        <div class="dialog" onclick="event.stopPropagation()">
          <h3>¿Cómo capturar el polígono?</h3>
          <p>Elige el modo según tu situación.</p>
          <div class="recorder-modeSelector-grid" id="ms-grid">
            <button class="recorder-modeSelector-btn" data-mode="walk">
              <div class="recorder-modeSelector-btn-icon">👣</div>
              <div class="recorder-modeSelector-btn-label">Caminar</div>
              <button class="recorder-modeSelector-info" data-info="walk" aria-label="Info Caminar">i</button>
            </button>
            <button class="recorder-modeSelector-btn" data-mode="trace">
              <div class="recorder-modeSelector-btn-icon">✏</div>
              <div class="recorder-modeSelector-btn-label">Trazar</div>
              <button class="recorder-modeSelector-info" data-info="trace" aria-label="Info Trazar">i</button>
            </button>
            <div class="recorder-modeSelector-info-text" id="info-walk">Captura puntos del perímetro <b>caminando</b> con GPS · halos de precisión + warning de cruces.</div>
            <div class="recorder-modeSelector-info-text" id="info-trace">Marca puntos arrastrando un pin sobre el mapa · ideal sin GPS o desde oficina.</div>
          </div>
          <div class="dialog-actions">
            <button class="btn btn-secondary" id="ms-cancel">Cancelar</button>
          </div>
        </div>
      </div>`;
    $overlay().innerHTML = html;
    let infoTimer = null;
    const cleanup = () => {
      if (infoTimer) { clearTimeout(infoTimer); infoTimer = null; }
      $overlay().innerHTML = '';
    };
    // Tap fuera o cancelar cierra sin selección
    $('#dialog-bd-mode').addEventListener('click', cleanup);
    $('#ms-cancel').addEventListener('click', e => { e.stopPropagation(); cleanup(); });
    // Tap info expande · auto-colapsa 15s · solo uno expandido a la vez
    $overlay().querySelectorAll('.recorder-modeSelector-info').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const which = btn.dataset.info;
        const target = $('#info-' + which);
        if (!target) return;
        const wasExpanded = target.classList.contains('expanded');
        $overlay().querySelectorAll('.recorder-modeSelector-info-text').forEach(el => el.classList.remove('expanded'));
        if (infoTimer) { clearTimeout(infoTimer); infoTimer = null; }
        if (!wasExpanded) {
          target.classList.add('expanded');
          infoTimer = setTimeout(() => target.classList.remove('expanded'), 15000);
        }
      });
    });
    // Tap modo selecciona · ignora si tap fue sobre el sub-botón info
    $overlay().querySelectorAll('.recorder-modeSelector-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        if (e.target.closest('.recorder-modeSelector-info')) return;
        const mode = btn.dataset.mode;
        cleanup();
        if (callback) callback(mode);
      });
    });
  }
})();
</script>
</body>
</html>
